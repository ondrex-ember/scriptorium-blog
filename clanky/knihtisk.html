<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Press · Olomouc 1468</title>
<meta name="description" content="The Press — a historical resource management game. Olomouc, 1468. Build a printing house from raw lead to illuminated manuscripts.">
<style>
:root {
  --bg:#080808; --surface:#0f0f0f; --card:#111111; --card2:#141414;
  --paper:#e8e0d0; --paper2:#d4c9b0; --ink:#1a1a1a;
  --muted:#2a2a2a; --border:#1e1e1e; --border2:#2a2a2a;
  --red:#8b0000; --red2:#a01010; --red3:#c01818;
  --gold:#c9952b; --gold2:#dba93a;
  --ok:#2a5a2a; --ok2:#3a7a3a;
  --danger:#cc0000; --blue:#1a3a6a; --blue2:#2a5a9a;
  --warm:#5a4a3a; --light:#e8e0d0;
  --accent:#8b0000;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:var(--paper);
  font-family:'Palatino Linotype','Book Antiqua',Georgia,serif;
  display:flex;justify-content:center;padding:6px;min-height:100vh;
}
#app{
  background:var(--surface);
  border:1px solid var(--border2);
  max-width:560px;width:100%;overflow:hidden;
  display:flex;flex-direction:column;max-height:100vh;
  box-shadow:0 0 40px rgba(139,0,0,.08);
}
/* Header */
.hdr{
  background:var(--card);color:var(--paper);
  padding:10px 14px;display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;border-bottom:2px solid var(--red);
}
.hdr h1{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin:0;}
.hdr small{font-size:9px;opacity:.5;letter-spacing:1px;text-transform:uppercase;}
/* Sections */
.sec{padding:10px 14px;border-bottom:1px solid var(--border);}
.sec-title{
  font-size:9px;text-transform:uppercase;letter-spacing:2px;
  color:var(--red);font-weight:700;margin-bottom:6px;
}
/* Buttons */
.btn{
  padding:5px 11px;border:1px solid var(--border2);
  background:var(--card2);color:var(--paper);
  cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;
  border-radius:0;transition:background .1s,border-color .1s;
  letter-spacing:.3px;
}
.btn:hover{background:var(--muted);border-color:#3a3a3a;}
.btn-p{background:var(--red);color:var(--paper);border-color:var(--red2);}
.btn-p:hover{background:var(--red2);border-color:var(--red3);}
.btn-s{padding:3px 7px;font-size:10px;}
.btn-active{background:var(--red)!important;color:var(--paper)!important;border-color:var(--red)!important;}
.btn-danger{background:#4a0000;color:#ff8888;border-color:#6a0000;}
.btn-ok{background:var(--ok);color:#aaffaa;border-color:var(--ok2);}
/* Pills */
.pill{
  display:inline-flex;align-items:center;gap:2px;padding:1px 5px;
  font-size:10px;font-weight:700;
  background:rgba(139,0,0,.08);border:1px solid rgba(139,0,0,.2);
  color:var(--paper);transition:background .2s,border-color .2s;
}
.pill.warn{background:rgba(200,0,0,.15);color:#ff9999;border-color:rgba(200,0,0,.3);}
.pill.ok{background:rgba(42,90,42,.2);color:#88cc88;border-color:rgba(42,90,42,.3);}
.pill.gold{background:rgba(201,149,43,.12);color:var(--gold2);border-color:rgba(201,149,43,.25);}
/* Flash on change */
@keyframes pill-gain{0%{background:rgba(42,140,42,.5);box-shadow:0 0 6px rgba(42,200,42,.4);}100%{background:rgba(139,0,0,.08);box-shadow:none;}}
@keyframes pill-lose{0%{background:rgba(180,0,0,.5);box-shadow:0 0 6px rgba(220,0,0,.4);}100%{background:rgba(139,0,0,.08);box-shadow:none;}}
@keyframes pill-critical{0%,100%{box-shadow:0 0 0px rgba(220,0,0,0);}50%{box-shadow:0 0 7px rgba(220,0,0,.7);border-color:rgba(220,0,0,.6);}}
.pill-flash-gain{animation:pill-gain .7s ease-out forwards;}
.pill-flash-lose{animation:pill-lose .7s ease-out forwards;}
.pill-critical{animation:pill-critical 1.4s ease-in-out infinite;}
/* Bars */
.bar-track{width:100%;height:6px;background:rgba(255,255,255,.05);overflow:hidden;}
.bar-fill{height:100%;transition:width .3s;}
/* Tabs */
.tabs{
  display:flex;gap:0;padding:0;border-bottom:2px solid var(--border2);
  background:var(--card);flex-shrink:0;overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  padding:7px 8px;font-size:11px;font-weight:500;color:#666;background:none;
  border:none;border-bottom:2px solid transparent;margin-bottom:-2px;
  cursor:pointer;font-family:inherit;white-space:nowrap;
  display:flex;align-items:center;gap:3px;flex-shrink:0;
  transition:color .15s;letter-spacing:.2px;
}
.tab .tab-label{font-size:10px;font-weight:700;max-width:0;overflow:hidden;opacity:0;
  transition:max-width .2s ease,opacity .15s ease;white-space:nowrap;}
.tab.active{color:var(--paper);border-bottom-color:var(--red);}
.tab.active .tab-label{max-width:80px;opacity:1;}
/* Content */
.content{flex:1;overflow-y:auto;min-height:0;scrollbar-width:none;}
.content::-webkit-scrollbar{display:none;}
/* Action bar */
.action-bar{
  padding:10px 14px;border-top:2px solid var(--border2);flex-shrink:0;
  background:var(--card);position:sticky;bottom:0;z-index:10;
}
/* Round bar */
.round-bar{
  display:flex;flex-direction:column;padding:4px 14px;
  background:rgba(0,0,0,.3);border-bottom:1px solid var(--border);flex-shrink:0;
}
.round-bar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;font-size:10px;}
.round-pip{
  width:20px;height:16px;display:flex;align-items:center;
  justify-content:center;font-size:7px;flex-shrink:0;
  border:1px solid #222;
}
/* Resource bar */
.res-bar{
  display:flex;flex-direction:column;gap:0;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.res-row{
  display:flex;align-items:center;gap:3px;
  padding:3px 14px;border-bottom:1px solid rgba(255,255,255,.03);
}
.res-row:last-child{border-bottom:none;}
.res-cat-label{
  font-size:7px;text-transform:uppercase;letter-spacing:1.5px;
  color:#444;width:42px;flex-shrink:0;font-weight:700;
}
.pill-row{display:flex;flex-wrap:nowrap;gap:3px;align-items:center;}
.pill-sep{color:#333;font-size:11px;padding:0 2px;flex-shrink:0;}
/* Pill with tooltip */
.pill-tip{position:relative;display:inline-flex;cursor:help;}
.pill-tip .ptip{
  display:none;position:absolute;bottom:calc(100% + 5px);left:50%;
  transform:translateX(-50%);background:var(--bg);color:var(--paper);
  font-size:10px;padding:5px 8px;white-space:nowrap;z-index:200;
  border:1px solid var(--red);pointer-events:none;line-height:1.5;
  font-family:'Palatino Linotype',Georgia,serif;
  box-shadow:0 4px 12px rgba(0,0,0,.6);
}
.pill-tip:hover .ptip{display:block;}
/* Worker cards */
.worker-card{margin-bottom:6px;padding:6px;background:rgba(255,255,255,.02);border:1px solid var(--border);}
.worker-name{font-size:12px;font-weight:700;margin-bottom:3px;}
/* Log */
.log-box{max-height:280px;overflow:auto;font-size:11px;line-height:1.5;
  font-family:'Courier New',monospace;padding:6px;background:rgba(0,0,0,.3);border:1px solid var(--border);}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;
  align-items:center;justify-content:center;z-index:100;padding:16px;}
.modal{
  background:var(--card);border:1px solid var(--border2);
  max-width:440px;width:100%;padding:18px;max-height:80vh;overflow:auto;
  box-shadow:0 0 40px rgba(0,0,0,.8);
}
.modal h3{font-size:14px;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;
  border-bottom:1px solid var(--red);padding-bottom:6px;color:var(--paper);}
/* Order cards */
.order-card{
  padding:8px;margin-bottom:6px;border:1px solid var(--border2);
  background:rgba(255,255,255,.02);
}
.order-card.active{border-color:var(--red);background:rgba(139,0,0,.06);}
.order-card.deadline-warn{border-color:#664400;background:rgba(80,40,0,.08);}
.order-card.deadline-crit{border-color:#660000;background:rgba(80,0,0,.1);}
/* Context panel */
.ctx-panel{
  padding:7px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
  background:rgba(139,0,0,.04);
}
.ctx-panel-top{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.ctx-icon{font-size:18px;flex-shrink:0;}
.ctx-phase{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:1px;}
.ctx-tip{font-size:11px;color:#8a7a6a;margin-top:1px;line-height:1.4;font-style:italic;}
/* Press dashboard */
.press-dash{background:var(--bg);border:1px solid var(--border2);padding:10px;margin-bottom:8px;color:var(--paper);}
.press-stat{background:rgba(255,255,255,.03);border:1px solid var(--border);padding:6px 8px;}
.press-stat-label{font-size:8px;color:#666;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;}
.press-stat-val{font-size:16px;font-weight:700;}
/* Wear visual */
.wear-bar{display:flex;gap:2px;margin-top:4px;}
.wear-seg{flex:1;height:8px;transition:background .4s;border:1px solid #1a1a1a;}
/* Parta grid */
.parta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px 12px;}
.parta-card{
  background:var(--card);border:2px solid var(--border2);overflow:hidden;
  cursor:pointer;transition:border-color .15s;
}
.parta-card:hover{border-color:#3a3a3a;}
.parta-card.mood-ok{border-color:rgba(42,90,42,.5);}
.parta-card.mood-warn{border-color:rgba(120,80,0,.5);}
.parta-card.mood-bad{border-color:rgba(139,0,0,.5);}
.parta-portrait{width:100%;aspect-ratio:1;overflow:hidden;background:var(--bg);}
.parta-info{padding:5px 6px 6px;}
.parta-name{font-size:10px;font-weight:700;color:var(--paper);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.parta-prof{font-size:8px;color:#666;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px;}
.parta-stars{font-size:9px;letter-spacing:-1px;color:var(--gold);}
/* Toast */
.toast-container{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:520px;z-index:200;pointer-events:none;}
.toast{
  background:var(--card);color:var(--paper);
  border:1px solid var(--border2);border-left:3px solid var(--red);
  padding:10px 14px;font-size:11px;line-height:1.5;margin-top:6px;
  animation:toastIn .25s ease;font-family:'Palatino Linotype','Book Antiqua',Georgia,serif;
}
.toast-title{font-weight:700;font-size:10px;color:var(--red);margin-bottom:3px;
  text-transform:uppercase;letter-spacing:1px;}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* Log entries */
.log-entry{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px;line-height:1.6;}
.log-entry:last-child{border-bottom:none;}
.log-year-hdr{font-size:12px;font-weight:700;color:var(--red);margin:10px 0 4px;
  padding-bottom:4px;border-bottom:1px solid rgba(139,0,0,.3);text-transform:uppercase;letter-spacing:1px;}
/* Settings */
.settings-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.settings-row:last-child{border-bottom:none;}
.settings-label{font-size:12px;color:var(--paper);flex:1;}
.settings-val{font-size:10px;color:var(--red);width:36px;text-align:right;}
/* Tooltip */
.tip-wrap{position:relative;display:inline-flex;}
.tip-wrap .tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--bg);color:var(--paper);font-size:10px;padding:5px 9px;
  white-space:nowrap;z-index:50;border:1px solid var(--red);pointer-events:none;line-height:1.4;
  font-family:'Palatino Linotype',Georgia,serif;}
.tip-wrap:hover .tip,.tip-wrap.open .tip{display:block;}
/* Interseason */
.interseason-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.interseason-card{padding:8px;background:rgba(0,0,0,.3);border:1px solid var(--border);font-size:12px;}
/* Task pill animation */
@keyframes pillFly{
  0%{opacity:1;transform:translateY(0) scale(1);}
  60%{opacity:1;transform:translateY(-38px) scale(1.1);}
  100%{opacity:0;transform:translateY(-70px) scale(.9);}
}
.task-pill{
  position:fixed;pointer-events:none;z-index:9999;
  padding:2px 8px;font-size:11px;font-weight:700;
  background:rgba(20,10,5,.9);color:var(--paper);white-space:nowrap;
  animation:pillFly .9s ease-out forwards;border:1px solid var(--border2);
}
.task-pill.pos{background:rgba(20,60,20,.9);color:#88cc88;}
.task-pill.neg{background:rgba(80,0,0,.9);color:#ff9999;}
/* Desktop layout */
#app.desktop{max-width:1140px;max-height:calc(100vh - 12px);}
#app.desktop .tabs{
  flex-direction:column;width:140px;flex-shrink:0;
  border-bottom:none;border-right:1px solid var(--border2);
  background:rgba(0,0,0,.2);overflow-x:visible;overflow-y:auto;
  padding:6px 0;gap:0;}
#app.desktop .tab{
  border-bottom:none;border-right:3px solid transparent;
  text-align:left;padding:9px 14px;font-size:11px;
  white-space:normal;margin-bottom:0;border-radius:0;}
#app.desktop .tab .tab-label{max-width:100px!important;opacity:1!important;}
#app.desktop .tab.active{border-right-color:var(--red);background:rgba(139,0,0,.08);color:var(--paper);}
#app.desktop .desktop-shell{display:flex;flex:1;overflow:hidden;min-height:0;}
#app.desktop .content-shell{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
#app.desktop .content{flex:1;overflow-y:auto;}
#app.desktop .action-bar{flex-shrink:0;}
#app.desktop .toast-container{left:auto;right:20px;transform:none;max-width:360px;}
#app.desktop .overview-cols{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid var(--border);}
#app.desktop .overview-cols>.sec{border-bottom:none;border-right:1px solid var(--border);}
#app.desktop .overview-cols>.sec:last-child{border-right:none;}
#app.desktop .workers-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 14px 10px;}
#app.desktop .workers-grid .worker-card{margin-bottom:0;}
#app.desktop .parta-grid{grid-template-columns:repeat(5,1fr);}
@media(max-width:600px){body{padding:3px;}.hdr h1{font-size:11px;}}
/* ── NPC HERO MODAL ── */
.hero-modal{max-width:480px;}
.hero-portrait-wrap{
  position:relative;width:100%;height:180px;
  background:var(--bg);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;margin-bottom:0;
}
.hero-portrait-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 50%,var(--card) 100%);
  pointer-events:none;
}
.hero-portrait-emoji{font-size:72px;line-height:1;z-index:1;}
.hero-name-block{
  padding:10px 14px 6px;
  border-bottom:1px solid var(--border);
}
.hero-name{font-size:18px;font-weight:700;letter-spacing:.5px;color:var(--paper);}
.hero-prof{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--red);margin-top:2px;}
.hero-stars{font-size:16px;color:var(--gold);letter-spacing:0px;margin-top:4px;}
.hero-quote{
  font-size:12px;font-style:italic;color:#8a7a6a;
  padding:8px 14px;border-bottom:1px solid var(--border);line-height:1.6;
}
.hero-stats-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:0;
  border-bottom:1px solid var(--border);
}
.hero-stat{
  padding:8px 14px;border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.hero-stat:nth-child(even){border-right:none;}
.hero-stat-label{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:#555;margin-bottom:4px;}
.hero-stat-bar{height:4px;background:rgba(255,255,255,.06);margin-bottom:2px;}
.hero-stat-bar-fill{height:100%;transition:width .4s;}
.hero-stat-val{font-size:11px;font-weight:700;}
.hero-traits{padding:10px 14px;border-bottom:1px solid var(--border);}
.hero-trait-row{
  display:flex;align-items:flex-start;gap:8px;
  padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);
  font-size:11px;line-height:1.5;
}
.hero-trait-row:last-child{border-bottom:none;}
.hero-trait-icon{font-size:14px;flex-shrink:0;width:20px;text-align:center;}
.hero-trait-name{font-weight:700;color:var(--paper);min-width:70px;}
.hero-trait-desc{color:#888;font-size:10px;}
.hero-tasks{padding:10px 14px;border-bottom:1px solid var(--border);}
.hero-history{padding:10px 14px;font-size:11px;color:#888;line-height:1.6;border-bottom:1px solid var(--border);}
.hero-actions{padding:10px 14px;display:flex;gap:6px;flex-wrap:wrap;}
/* Hire card improvements */
.hire-card{
  padding:10px 12px;margin-bottom:6px;
  border:1px solid var(--border2);background:rgba(255,255,255,.02);
  cursor:pointer;transition:border-color .15s;
}
.hire-card:hover{border-color:#3a3a3a;}
.hire-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.hire-card-name{font-weight:700;font-size:12px;color:var(--paper);}
.hire-card-prof{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--red);margin-top:1px;}
.hire-card-quote{font-size:10px;font-style:italic;color:#666;margin-top:4px;line-height:1.5;}
.hire-card-traits{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.hire-card-trait{font-size:10px;padding:1px 5px;border:1px solid var(--border2);color:#888;}
/* Sell section on market */
.sell-item-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 8px;border:1px solid var(--border2);margin-bottom:4px;
  background:rgba(255,255,255,.02);
}
.sell-item-row:hover{border-color:#3a3a3a;}
.sell-item-name{font-size:11px;color:var(--paper);}
.sell-item-qty{font-size:10px;color:#666;}
.sell-item-price{font-size:10px;color:var(--gold);font-weight:700;}
/* Reputation track */
.rep-track{
  display:flex;gap:2px;margin-top:3px;
}
.rep-pip{
  flex:1;height:6px;border:1px solid #1a1a1a;
  transition:background .3s;
}
.rep-label{
  font-size:8px;text-transform:uppercase;letter-spacing:1px;color:#555;
  margin-top:2px;display:flex;justify-content:space-between;
}
/* Market category divider */
.mkt-cat{
  font-size:9px;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--red);font-weight:700;margin:10px 0 5px;
  padding-bottom:3px;border-bottom:1px solid rgba(139,0,0,.2);
}
/* ── IMPRIMATUR & HISTORICAL EVENTS ── */
.imprimatur-badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:1px 6px;font-size:9px;font-weight:700;letter-spacing:.5px;
  border:1px solid rgba(58,106,154,.4);color:#7aaadd;
  background:rgba(58,106,154,.08);
}
.imprimatur-badge.pending{
  border-color:rgba(201,149,43,.4);color:var(--gold);
  background:rgba(201,149,43,.08);
}
.imprimatur-badge.denied{
  border-color:rgba(139,0,0,.4);color:#ff9999;
  background:rgba(139,0,0,.08);
}
.cenzura-badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:1px 6px;font-size:9px;font-weight:700;
  border:1px solid rgba(139,0,0,.5);color:#ff7777;
  background:rgba(139,0,0,.1);
}
/* Historical event modal */
.hist-modal{max-width:500px;}
.hist-modal-year{
  font-size:11px;text-transform:uppercase;letter-spacing:2px;
  color:var(--red);margin-bottom:4px;
}
.hist-modal-title{
  font-size:22px;font-weight:700;letter-spacing:1px;
  margin-bottom:12px;line-height:1.2;
}
.hist-modal-body{font-size:12px;line-height:1.8;color:#bbb;margin-bottom:14px;}
.hist-modal-effects{
  background:rgba(0,0,0,.3);border:1px solid var(--border2);
  padding:10px 12px;margin-bottom:14px;
}
.hist-modal-effect{
  display:flex;gap:8px;align-items:flex-start;
  font-size:11px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);
  line-height:1.5;
}
.hist-modal-effect:last-child{border-bottom:none;}
.hist-modal-effect-icon{font-size:14px;flex-shrink:0;width:20px;}
.hist-modal-choice{
  padding:10px 12px;border:1px solid var(--border2);margin-bottom:6px;
  cursor:pointer;transition:border-color .15s,background .15s;font-size:11px;
  line-height:1.5;
}
.hist-modal-choice:hover{border-color:var(--red);background:rgba(139,0,0,.06);}
.hist-modal-choice-title{font-weight:700;color:var(--paper);margin-bottom:3px;}
.hist-modal-choice-desc{color:#888;font-size:10px;}
/* Secret printing indicator */
.secret-print{
  display:inline-flex;align-items:center;gap:3px;
  padding:1px 5px;font-size:9px;font-weight:700;
  border:1px dashed rgba(139,0,0,.5);color:#ff9999;
  background:rgba(139,0,0,.06);
}
/* Historical event banner */
.hist-banner{
  background:rgba(139,0,0,.12);border:1px solid var(--red);
  padding:8px 12px;margin-bottom:6px;font-size:11px;line-height:1.6;
}
.hist-banner-title{font-weight:700;color:var(--red);font-size:12px;margin-bottom:4px;
  text-transform:uppercase;letter-spacing:1px;}
/* Order progress */
.order-progress{height:4px;background:rgba(255,255,255,.06);margin-top:6px;overflow:hidden;}
.order-progress-fill{height:100%;background:var(--red);transition:width .4s;}
/* Stars */
.stars{color:var(--gold);letter-spacing:-1px;font-size:11px;}
/* Type wear bricks */
.type-brick{flex:1;height:8px;border:1px solid #111;transition:background .3s;}
/* ── FOOTER ── */
.game-footer{
  flex-shrink:0;padding:5px 14px;border-top:1px solid var(--border2);
  background:var(--card);display:flex;align-items:center;justify-content:space-between;
  font-size:9px;color:#333;letter-spacing:1.5px;position:relative;overflow:hidden;
}
.game-footer::before{
  content:'';position:absolute;left:0;right:0;top:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--red),var(--gold),var(--red),transparent);
  animation:footer-glow 4s ease-in-out infinite;
}
@keyframes footer-glow{0%,100%{opacity:.25;}50%{opacity:.9;}}
/* ── ABOUT MODAL ── */
.about-inner{max-width:400px;}
.about-inner h4{color:var(--gold);font-size:9px;letter-spacing:2px;text-transform:uppercase;
  margin:14px 0 4px;border-bottom:1px solid var(--border);padding-bottom:3px;}
.about-inner p{font-size:11px;line-height:1.8;color:#aaa;margin-bottom:6px;}
.about-inner .sigil{text-align:center;font-size:30px;margin-bottom:8px;}
.about-inner .latin{text-align:center;font-style:italic;color:var(--red);
  font-size:10px;letter-spacing:1.5px;margin-bottom:14px;}
/* ── AUDIO INDICATOR ── */
.audio-dot{width:6px;height:6px;border-radius:50%;background:#2a2a2a;
  display:inline-block;margin-left:5px;transition:background .3s;}
.audio-dot.on{background:#44aa44;box-shadow:0 0 5px #44aa44;}
</style>

// ── IMPRIMATUR SYSTEM ─────────────────────────────────────────
// Tracks orders waiting for bishop's approval
// imprimaturQueue: [{instanceId, orderId, requestedRound, status: 'pending'|'approved'|'denied'}]

function requestImprimatur(order){
  const L=G.lang;
  if(!G.imprimaturQueue) G.imprimaturQueue=[];
  // Check if already in queue
  if(G.imprimaturQueue.find(x=>x.instanceId===order.instanceId)) return;
  G.imprimaturQueue.push({
    instanceId: order.instanceId,
    orderId: order.id,
    requestedRound: G.round,
    status: 'pending',
  });
  G.log.push(`__EVT__✝️ ${L==="en"?"Imprimatur requested for":"Imprimatur žádán pro"}: ${L==="en"?order.en:order.cs}`);
  render();
}

function processImprimaturQueue(){
  if(!G.imprimaturQueue) return;
  const L=G.lang;
  G.imprimaturQueue = G.imprimaturQueue.map(item=>{
    if(item.status!=='pending') return item;
    // Takes 1 round — approve after 1 month
    if(G.round > item.requestedRound){
      // 85% approval rate (loyal stance improves this)
      const approvalRate = G.reformationStance==="loyal"?0.97:G.reformationStance==="reform"?0.60:0.85;
      const approved = Math.random() < approvalRate;
      if(approved){
        G.log.push(`__EVT__✝️ ✅ ${L==="en"?"Imprimatur GRANTED":"Imprimatur UDĚLEN"}`);
        return {...item, status:'approved'};
      } else {
        G.log.push(`__EVT__✝️ ❌ ${L==="en"?"Imprimatur DENIED — bishop objects to content":"Imprimatur ZAMÍTNUT — biskup má námitky"}`);
        G.reputation = clamp(G.reputation-1, 0, 10);
        return {...item, status:'denied'};
      }
    }
    return item;
  });
}

function getImprimaturStatus(instanceId){
  if(!G.imprimaturQueue) return null;
  return G.imprimaturQueue.find(x=>x.instanceId===instanceId)||null;
}

function triggerHistEvent(eventId){
  G._pendingHistEvent = eventId;
  G.phase = "histEvent";
  render();
}

function resolveHistEvent(eventId, choiceId){
  const L=G.lang;
  const evt=HIST_EVENTS[eventId];
  if(!evt) return;
  G.histEvents.push(eventId);
  G._pendingHistEvent = null;

  if(eventId==="reformation"){
    G.reformation=true;
    G.reformationStance = choiceId;
    if(choiceId==="loyal"){
      G.reputation=clamp(G.reputation+2,0,10);
      G.log.push(`__EVT__✝️ ${L==="en"?"Stance: Loyal to Church. Imprimatur required for all religious work.":"Postoj: Věrnost Církvi. Imprimatur vyžadován pro všechna náboženská díla."}`);
    } else if(choiceId==="reform"){
      G.prestige+=10; G.reputation=clamp(G.reputation-2,0,10);
      G.log.push(`__EVT__✊ ${L==="en"?"Stance: Reform. Secret printing available. Cenzura risk doubled.":"Postoj: Reformace. Tajný tisk dostupný. Riziko cenzury zdvojnásobeno."}`);
    } else {
      G.log.push(`__EVT__⚖️ ${L==="en"?"Stance: Neutral. Navigate each case as it comes.":"Postoj: Neutralita. Každý případ posuzuj zvlášť."}`);
    }
  }

  if(eventId==="index"){
    G.indexActive=true;
    G.indexStance = choiceId;
    if(choiceId==="comply"){
      G.reputation=clamp(G.reputation+3,0,10);
      G.log.push(`__EVT__📕 ${L==="en"?"Full compliance with the Index. Reputation grows.":"Plný soulad s Indexem. Reputace roste."}`);
    } else if(choiceId==="hide"){
      G.log.push(`__EVT__🕯️ ${L==="en"?"Hidden press operational. Forbidden orders available — at great risk.":"Skrytý lis v provozu. Zakázané zakázky dostupné — s velkým rizikem."}`);
    } else if(choiceId==="denounce"){
      G.reputation=clamp(G.reputation-3,0,10);
      G.gold+=20; // competitor's business flows to you
      G.log.push(`__EVT__👁️ ${L==="en"?"Rival printer denounced. Their clients come to you. +20g.":"Konkurenční tiskař udán. Jejich zákazníci přicházejí k vám. +20g."}`);
    }
  }

  G.phase="interseason";
  render();
}

// Check if historical events should trigger (called from startInterseason)
function checkHistEvents(){
  if(G.gameYear===HIST_EVENTS.reformation.triggerYear && !G.histEvents.includes("reformation")){
    setTimeout(()=>triggerHistEvent("reformation"),100);
    return true;
  }
  if(G.gameYear===HIST_EVENTS.index.triggerYear && !G.histEvents.includes("index")){
    setTimeout(()=>triggerHistEvent("index"),100);
    return true;
  }
  return false;
}

  const avail = getAvailableNPC().filter(n => (n.availYear||0) <= gameYear);
  const shuffled = [...avail].sort(()=>Math.random()-.5);
  return shuffled.slice(0, Math.min(count, shuffled.length)).map(npc=>({
    id:"c"+npc.id, npcId:npc.id,
    name:npc.name, prof:npc.prof, lv:npc.lv,
    traits:npc.traits, hireCost:npc.hireCost, wageMod:npc.wageMod,
    portrait:npc.portrait,
    quote_en:npc.quote_en, quote_cs:npc.quote_cs,
    loyalty:npc.loyalty, health:npc.health, mood:npc.mood,
    gender:npc.gender||"m",
    xp:0, fat:0, task:"idle"
  }));
}
function hireWorker(candidate){
  if(G.workers.length >= MAX_WORKERS || G.gold < candidate.hireCost) return;
  G.gold -= candidate.hireCost;
  G.workers.push({...candidate, id:"w"+Date.now()});
  G.interseason.candidates = G.interseason.candidates.filter(c=>c.id!==candidate.id);
  const L=G.lang;
  G.log.push(`__ECO__👷 ${candidate.name} ${L==="en"?"hired":"přijat"} (-${candidate.hireCost}g)`);
  render();
}
function fireWorker(workerId){
  if(G.workers.length <= 1) return;
  const w = G.workers.find(x=>x.id===workerId);
  if(!w || w.traits?.includes("houzevatny")) return;
  G.workers = G.workers.filter(x=>x.id!==workerId);
  G.log.push(`__ECO__👋 ${w.name} ${G.lang==="en"?"left":"odešel"}`);
  render();
}

// Pool of orders already seen this year (to avoid repeats)
function genSingleOrder(gameYear, excludeIds){
  let pool = [...ORDER_POOL];
  if(G.reputation < 4) pool = pool.filter(o=>o.type!=="state"&&o.type!=="luxury");
  if(G.reputation < 7) pool = pool.filter(o=>o.type!=="luxury");
  // Exclude already visible and recently shown
  const excluded = new Set(excludeIds||[]);
  pool = pool.filter(o=>!excluded.has(o.id));
  if(!pool.length) pool = [...ORDER_POOL].filter(o=>{
    if(G.reputation<4&&(o.type==="state"||o.type==="luxury")) return false;
    if(G.reputation<7&&o.type==="luxury") return false;
    return true;
  });
  const pick = pool[Math.floor(Math.random()*pool.length)];
  if(!pick) return null;
  return {
    ...pick,
    instanceId: "oi"+Date.now()+Math.floor(Math.random()*9999),
    deadline: G.round + pick.duration,
    progress: 0, accepted: false,
    appearedRound: G.round,
  };
}

function genOrderPool(gameYear, count){
  const seen = new Set();
  const orders = [];
  for(let i=0;i<count;i++){
    const o = genSingleOrder(gameYear, [...seen, ...orders.map(x=>x.id)]);
    if(o){ orders.push(o); seen.add(o.id); }
  }
  return orders;
}

// Called each round — rotate 1-2 old orders, add fresh ones
function rotateOrders(){
  const L=G.lang;
  const existing = G.availOrders || [];
  // Orders that have been on market 3+ rounds get replaced
  const stale = existing.filter(o=>(G.round - (o.appearedRound||0)) >= 3);
  const fresh = existing.filter(o=>(G.round - (o.appearedRound||0)) < 3);
  // Always keep at least 5, max 7 slots (Leipzig = +1 bonus)
  const isLeipzig = LEIPZIG_ROUNDS.includes(G.round);
  const targetCount = isLeipzig ? 6 : 5;
  const existingIds = new Set(existing.map(o=>o.id));
  // Replace stale + fill up to target
  let result = [...fresh];
  const needed = targetCount - result.length;
  for(let i=0;i<needed;i++){
    const o = genSingleOrder(G.gameYear, [...existingIds, ...result.map(x=>x.id)]);
    if(o){ result.push(o); existingIds.add(o.id); }
  }
  // Leipzig bonus slot — always a high-value order
  if(isLeipzig && !G._leipzigBonusShown){
    const luxPool = ORDER_POOL.filter(o=>(o.type==="luxury"||o.type==="state")&&!existingIds.has(o.id));
    if(luxPool.length){
      const bonus = luxPool[Math.floor(Math.random()*luxPool.length)];
      if(G.reputation >= (bonus.type==="luxury"?7:4)){
        result.push({...bonus, instanceId:"oi_lp"+Date.now(), deadline:G.round+bonus.duration,
          progress:0, accepted:false, appearedRound:G.round, isLeipzigBonus:true});
        G._leipzigBonusShown=true;
        G.log.push(`__EVT__🏪 ${L==="en"?"Leipzig Fair — premium order available!":"Lipský jarmark — prémiová zakázka k dispozici!"}`);
      }
    }
  }
  if(!isLeipzig) G._leipzigBonusShown=false;
  G.availOrders = result;
}

// Manual refresh — costs 2g, replaces all orders
function refreshOrders(){
  const L=G.lang;
  if(G.gold < 2){ showToast(L==="en"?"Not enough gold":"Nedostatek zlata",["Need 2g to send a messenger."]); return; }
  G.gold -= 2;
  G.availOrders = genOrderPool(G.gameYear, LEIPZIG_ROUNDS.includes(G.round)?6:5);
  G.availOrders = G.availOrders.map(o=>({...o, appearedRound:G.round}));
  G.log.push(`__ECO__📮 ${L==="en"?"Messenger sent — new orders arrived (-2g)":"Posel odeslán — nové zakázky přišly (-2g)"}`);
  render();
}

function acceptOrder(instanceId){
  const L=G.lang;
  const o = G.availOrders.find(x=>x.instanceId===instanceId);
  if(!o) return;
  if(G.activeOrders.length >= 3) {
    showToast(L==="en"?"Workshop full":"Dílna plná", [L==="en"?"Cannot accept more than 3 simultaneous orders.":"Nelze přijmout více než 3 zakázky najednou."]);
    return;
  }
  if((o.type==="state") && G.reputation<4){
    showToast(L==="en"?"Reputation too low":"Nízká reputace",
      [L==="en"?"State orders require Reputation ≥4. Build your name first.":"Státní zakázky vyžadují Reputaci ≥4."]);
    return;
  }
  if(o.type==="luxury" && G.reputation<7){
    showToast(L==="en"?"Reputation too low":"Nízká reputace",
      [L==="en"?"Luxury orders require Reputation ≥7. The nobility must know your name.":"Luxusní zakázky vyžadují Reputaci ≥7."]);
    return;
  }
  // Depositum — customer pays 30% upfront as advance
  const depositum = Math.round(o.reward * 0.3);
  G.gold += depositum;
  G.activeOrders.push({...o, accepted:true, depositum, deadline: G.round + o.duration});
  G.availOrders = G.availOrders.filter(x=>x.instanceId!==instanceId);
  G.log.push(`__ECO__📜 ${L==="en"?"Order accepted":"Zakázka přijata"}: ${L==="en"?o.en:o.cs} · +${depositum}g ${L==="en"?"advance":"záloha"}`);
  render();
}
function canFulfillOrder(o){
  const r=G.res;
  const req=o.req;
  if(req.paper && r.paper < req.paper) return false;
  if(req.ink && r.ink < req.ink) return false;
  if(req.vellum && r.vellum < req.vellum) return false;
  if(req.letters && G.letters < 3) return false;
  if(o.workers){
    for(const wp of o.workers){
      const hasWorker = G.workers.some(w=>w.prof===wp && w.task!=="idle");
      if(!hasWorker) return false;
    }
  }
  return true;
}
function fulfillOrder(instanceId){
  const L=G.lang;
  const o = G.activeOrders.find(x=>x.instanceId===instanceId);
  if(!o || !canFulfillOrder(o)) return;
  if(o.req.paper)  G.res.paper  -= o.req.paper;
  if(o.req.ink)    G.res.ink    -= o.req.ink;
  if(o.req.vellum) G.res.vellum -= o.req.vellum;
  const hasAgent = G.workers.some(w=>w.prof==="agent"&&w.task!=="idle"&&w.traits?.includes("obchodnik"));
  const hasCorrct = G.workers.some(w=>w.prof==="corrector"&&w.task!=="idle");
  const hasZnalec = G.workers.some(w=>w.traits?.includes("znalec")&&w.task!=="idle");
  const baseQ = Math.round(2 + G.pressRunIn/50 + (hasCorrct?1:0) + (Math.random()-.2)*1.2);
  const quality = clamp(baseQ, 1, 5);
  const isLeipzig = LEIPZIG_ROUNDS.includes(G.round);
  const leiptMult = isLeipzig ? 1.8 : 1.0;
  const agentMult = hasAgent ? 1.1 : 1.0;
  const popBonus = (G.reformation && o.type==="popular") ? 2 : 0;
  const baseReward = Math.round(o.reward * leiptMult * agentMult * (0.8 + quality*0.08)) + popBonus;
  // Patron bonus
  const fullReward = applyPatronBonus(o, baseReward);
  const patronBonus = fullReward - baseReward;
  const remaining = Math.max(0, fullReward - (o.depositum||0));
  let prestige = o.prestige + (hasCorrct?1:0) + (quality>=4?1:0);
  if(o.type==="scientific" && hasZnalec) prestige += 1;

  // ── CENZURA RISK (post-Reformation, religious orders) ──
  let cenzuraTriggered = false;
  if(G.reformation && o.type==="religious"){
    const impStatus = getImprimaturStatus(instanceId);
    const hasApproval = impStatus?.status==="approved";
    const isSecret = o.secretPrint;
    // Risk calc
    const baseRisk = G.reformationStance==="reform"?0.40:0.20;
    const secretRisk = isSecret ? 0.40 : 0;
    const totalRisk = hasApproval ? 0.05 : (isSecret ? secretRisk : baseRisk);
    if(Math.random() < totalRisk){
      cenzuraTriggered = true;
      const fine = Math.round(fullReward * 0.5);
      G.gold = Math.max(0, G.gold - fine);
      G.reputation = clamp(G.reputation-2, 0, 10);
      G.log.push(`__EVT__🚨 ${L==="en"?"CENZURA! Workshop raided":"CENZURA! Dílna prohledána"} · -${fine}g ${L==="en"?"fine":"pokuta"} · -2 ${L==="en"?"Rep":"Rep"}`);
      showToast(L==="en"?"⚠️ Cenzura!":"⚠️ Cenzura!",
        [L==="en"?"Bishop's censors raided your workshop!":"Biskupovi cenzoři prohledali dílnu!",
         `-${fine}g fine · -2 Reputation`,
         L==="en"?"Get Imprimatur next time.":"Příště si zajisti imprimatur."]);
    }
  }

  // ── INDEX INQUISITOR RISK ──
  if(G.indexActive && G.indexStance==="hide" && (o.type==="scientific"||o.type==="religious")){
    if(Math.random() < 0.15){
      const fine = Math.round(fullReward * 0.7);
      G.gold = Math.max(0, G.gold - fine);
      G.reputation = clamp(G.reputation-3, 0, 10);
      G.log.push(`__EVT__👁️ ${L==="en"?"INQUISITOR VISIT! Forbidden text found":"INKVIZITOR! Nalezen zakázaný text"} · -${fine}g · -3 ${L==="en"?"Rep":"Rep"}`);
    }
  }

  if(!cenzuraTriggered){
    G.gold += remaining;
    G.prestige += prestige;
    G.reputation = clamp(G.reputation + (quality>=4?1:0), 0, 10);
    // Force gold pill flash by clearing prev value
    if(typeof _prevPillVals!=="undefined") { delete _prevPillVals["gold"]; delete _prevPillVals["prestige"]; }
    // Audio — print cycle + completion sounds
    if(typeof AUDIO!=="undefined"){ AUDIO.printCycle(); setTimeout(()=>AUDIO.play('bellComplete'),1600); setTimeout(()=>AUDIO.play('coinClink'),1800); }
  }
  G.completedOrders++;
  G.orderIncome += fullReward;
  G.printedSheets += (o.req.paper||0);
  G.activeOrders = G.activeOrders.filter(x=>x.instanceId!==instanceId);
  // Clean imprimatur entry
  if(G.imprimaturQueue) G.imprimaturQueue = G.imprimaturQueue.filter(x=>x.instanceId!==instanceId);
  const leiplabel = isLeipzig ? ` 🏪×1.8`:"";
  if(!cenzuraTriggered){
    G.log.push(`__ECO__✅ ${L==="en"?"Fulfilled":"Dokončena"}: ${L==="en"?o.en:o.cs} · +${remaining}g${leiplabel} · +${prestige}P · ${"★".repeat(quality)}`);
    showToast(L==="en"?"Order Complete":"Zakázka dokončena",
      [`${L==="en"?o.en:o.cs}`,
       `+${remaining}g ${isLeipzig?"🏪 Leipzig!":""}${popBonus>0?" 📣+"+popBonus+"g":""}`,
       `+${prestige} Prestige · ${"★".repeat(quality)}`]);
  }
  render();
}

function getCompositorLevel(){
  // Best compositor level among active compositors
  const comps = G.workers.filter(w=>
    (w.prof==="compositor"||w.prof==="printer") && w.task!=="idle");
  if(!comps.length) return 0;
  return Math.max(...comps.map(w=>w.lv));
}

function checkFormatUnlocks(){
  const L=G.lang;
  const yr=G.gameYear;
  const compLv=getCompositorLevel();
  const newUnlocks=[];
  Object.values(BOOK_FORMATS).forEach(fmt=>{
    if(G.formatUnlocks.includes(fmt.id)) return;
    if(yr>=fmt.unlockYear && compLv>=(fmt.compositorMinLevel)){
      if(fmt.requiresItalic && G.italic_type<2) return;
      newUnlocks.push(fmt.id);
    }
  });
  if(newUnlocks.length){
    G.formatUnlocks=[...G.formatUnlocks,...newUnlocks];
    newUnlocks.forEach(fid=>{
      const fmt=BOOK_FORMATS[fid];
      G.log.push(`__EVT__📚 ${L==="en"?"Format unlocked":"Formát odemčen"}: ${fmt.symbol} ${L==="en"?fmt.en:fmt.cs}`);
      showToast(L==="en"?"New Format Unlocked":"Nový formát odemčen",
        [`${fmt.icon} ${fmt.symbol} ${L==="en"?fmt.en:fmt.cs}`,
         L==="en"?fmt.tip_en:fmt.tip_cs]);
    });
  }
  // Check epoch progression
  checkEpoch();
}

function checkEpoch(){
  const L=G.lang;
  let newEpoch=1;
  if(G.formatUnlocks.includes("octavo")||G.gameYear>=3) newEpoch=2;
  if(G.formatUnlocks.includes("duodecimo")||G.gameYear>=5||G.reformation) newEpoch=3;
  if(newEpoch>G.currentEpoch){
    G.currentEpoch=newEpoch;
    const ep=EPOCHS[newEpoch-1];
    G.log.push(`__EVT__${ep.icon} === ${L==="en"?ep.name_en:ep.name_cs} (${ep.years}) ===`);
    G.log.push(`__FLAVOR__${L==="en"?ep.desc_en:ep.desc_cs}`);
  }
}

// Print a run using the current format
// Returns: {output, paperUsed, inkUsed, impositionError, quality}
function printRun(formatId){
  const L=G.lang;
  const fmt=BOOK_FORMATS[formatId];
  if(!fmt){ G.log.push(`__EVT__⛔ Unknown format`); render(); return; }
  if(!G.formatUnlocks.includes(formatId)){
    showToast(L==="en"?"Format locked":"Formát zamčen",
      [L==="en"?`${fmt.en} requires Year ${fmt.unlockYear} and Compositor Lv${fmt.compositorMinLevel}`
               :`${fmt.cs} vyžaduje rok ${fmt.unlockYear} a Sazeč Lv${fmt.compositorMinLevel}`]);
    render(); return;
  }
  // Check italic for Octavo
  if(fmt.requiresItalic && G.italic_type<2){
    showToast(L==="en"?"Italic type required":"Kurzíva vyžadována",
      [L==="en"?"Octavo needs italic type. Buy or engrave italic sorts.":"Oktáv vyžaduje kurzívní litery. Kup nebo vyrob kurzívu."]);
    render(); return;
  }
  // Check resources
  if(G.res.paper<fmt.paperCost){
    G.log.push(`__EVT__⛔ ${L==="en"?"Not enough paper":"Nedostatek papíru"}`); render(); return;
  }
  if(G.res.ink<fmt.inkCost){
    G.log.push(`__EVT__⛔ ${L==="en"?"Not enough ink":"Nedostatek inkoustu"}`); render(); return;
  }
  if(G.letters<2){
    G.log.push(`__EVT__⛔ ${L==="en"?"Not enough type sets":"Nedostatek sad liter"}`); render(); return;
  }

  // Imposition risk check
  const compLv=getCompositorLevel();
  // Frisket — reduces imposition risk and boosts quality
  const hasFrisket = (G.frisket||0) > 0 && (G.frisketWear||0) > 0;
  const frisketRiskMult = hasFrisket ? 0.5 : 1.0;
  const frisketQBonus  = hasFrisket ? 0.5 : 0;

  let impositionError=false;
  if(compLv<fmt.compositorMinLevel && fmt.impositionRisk>0){
    if(Math.random()<fmt.impositionRisk*frisketRiskMult){
      impositionError=true;
      const wasted=Math.max(1,Math.floor(fmt.paperCost/2));
      G.res.paper=Math.max(0,G.res.paper-wasted);
      G.impositionErrors=(G.impositionErrors||0)+1;
      G.morale=Math.max(0,G.morale-5);
      G.log.push(`__EVT__⚠️ ${L==="en"?"Imposition error":"Chyba impozice"}! ${wasted}× ${L==="en"?"paper wasted":"papír zničen"} (${fmt.symbol} ${L==="en"?"needs":"vyžaduje"} Lv${fmt.compositorMinLevel})`);
      showToast(L==="en"?"Imposition Error":"Chyba impozice!",
        [L==="en"?`Pages folded wrong — ${wasted} sheets ruined`:`Stránky špatně přeloženy — ${wasted} archů zničeno`,
         L==="en"?`Hire a Lv${fmt.compositorMinLevel}+ Compositor to avoid this`:`Najmi Sazeče Lv${fmt.compositorMinLevel}+ pro prevenci`]);
      render(); return;
    }
  }

  // Consume resources
  G.res.paper-=fmt.paperCost;
  G.res.ink-=fmt.inkCost;
  G.letterWear=Math.min(G.letterWear+3, 100);
  G.pressRunIn=Math.min(G.pressRunIn+4, 100);

  // Skill perks — printer and corrector
  const bestPrinter2=G.workers.filter(w=>w.prof==="printer"&&w.task!=="idle").sort((a,b)=>b.lv-a.lv)[0];
  const printerLv2=bestPrinter2?bestPrinter2.lv:0;
  const hasBarvir=G.workers.some(w=>w.prof==="inkman"&&w.task!=="idle")||G.workers.some(w=>w.task==="print"&&w.prof!=="printer");
  const hasCorrct=G.workers.some(w=>w.prof==="corrector"&&w.task!=="idle");
  const corrctLv=G.workers.filter(w=>w.prof==="corrector"&&w.task!=="idle").sort((a,b)=>b.lv-a.lv)[0]?.lv||0;

  // Printer lv3: can print without inker but −1 quality; lv4: +1 quality bonus
  const noInkerPenalty=(!hasBarvir&&printerLv2<3)?-1:0;
  const printerQBonus=printerLv2>=4?1:0;
  // Corrector lv3: +2 prestige on luxury; lv2: no quality penalty from errors
  const corrctQBonus=corrctLv>=2?1:0;

  // Quality roll — pressWear penalty at >90%
  const wearPenalty = (G.press_wear||0)>=90 ? -1 : 0;
  const baseQ=Math.round(1+G.pressRunIn/40+(hasCorrct?1:0)+compLv*0.3+(Math.random()-.3)+wearPenalty+noInkerPenalty+printerQBonus+corrctQBonus+frisketQBonus);
  const quality=clamp(baseQ,1,5);

  // Frisket wear — consume one use after successful print
  if(hasFrisket){
    G.frisketWear = Math.max(0, (G.frisketWear||0) - 1);
    if(G.frisketWear===0){
      G.frisket = Math.max(0, (G.frisket||0) - 1);
      if(G.frisket>0){
        // More friskets in stock — reset wear for next one
        const engraver=G.workers.find(w=>w.prof==="engraver");
        G.frisketWear = (engraver&&engraver.lv>=2) ? 10 : 5;
        G.log.push(`__EVT__🖼️ ${L==="en"?"Frisket worn out — new one loaded":"Frisket opotřeben — nový nasazen"}`);
      } else {
        G.frisketWear = 0;
        G.log.push(`__EVT__🖼️ ${L==="en"?"Last frisket worn out — make a new one":"Poslední frisket opotřeben — vyrobte nový"}`);
        showToast(L==="en"?"Frisket Gone":"Frisket pryč",
          [L==="en"?"Assign Engraver + 1 paper to make a new frisket":"Přiřaď Rytce + 1 papír pro výrobu frisketu"]);
      }
    }
  }

  // Output: fmt.outputMult books + press level bonus
  const pressOutputBonus=(G.pressLevel>=3?2:G.pressLevel>=2?1:0);
  const output=fmt.outputMult+pressOutputBonus;
  const totalValue=fmt.baseValue*output;
  // Corrector lv3: +2 prestige on luxury
  const corrctPrestigeBonus=(corrctLv>=3&&fmt.id==="luxury")?2:0;
  const prestige=fmt.prestigeValue*output + (quality>=4?1:0) + corrctPrestigeBonus;

  // Store printed books as a resource
  const bookKey="books_"+formatId;
  if(!G.printedBooks) G.printedBooks={};
  if(!G.printedBooks[formatId]) G.printedBooks[formatId]=[];
  for(let i=0;i<output;i++) G.printedBooks[formatId].push(quality);

  G.printedSheets+=(fmt.paperCost);
  G.prestige+=prestige;
  G.log.push(`__PROD__${fmt.icon} ${L==="en"?"Printed":"Vytištěno"} ${output}× ${fmt.symbol} ${"★".repeat(quality)} (+${prestige}P)`);

  // Check format unlocks after every print
  checkFormatUnlocks();
  render();
}

// Sell printed books
function sellBooks(formatId, qty){
  const L=G.lang;
  if(!G.printedBooks||!G.printedBooks[formatId]||!G.printedBooks[formatId].length) return;
  const fmt=BOOK_FORMATS[formatId];
  const hasAgent=G.workers.some(w=>w.prof==="agent"&&w.task==="sell"&&w.traits?.includes("obchodnik"));
  const isLeipzig=LEIPZIG_ROUNDS.includes(G.round);
  const mult=(hasAgent?1.1:1.0)*(isLeipzig?1.8:1.0);
  const inv=[...G.printedBooks[formatId]];
  inv.sort((a,b)=>b-a);
  const selling=inv.slice(0,Math.min(qty,inv.length));
  const earned=Math.round(selling.reduce((s,q)=>s+Math.round(fmt.baseValue*(0.7+q*0.1)*mult),0));
  G.printedBooks[formatId]=inv.slice(selling.length);
  G.gold+=earned;
  G.log.push(`__ECO__💰 ${L==="en"?"Sold":"Prodáno"} ${selling.length}× ${fmt.symbol} → +${earned}g${isLeipzig?" 🏪":""}`);
  render();
}

function castType(){
  const L=G.lang;
  const needLead=2, needTin=1;
  if((G.res.lead||0)<needLead||(G.res.tin||0)<needTin){
    G.log.push(`__EVT__⛔ ${L==="en"?"Need 2 lead + 1 tin (+ antimony optional) to cast type metal":"Potřebuješ 2 olovo + 1 cín pro liteřinu"}`);
    render(); return;
  }
  // Leadman skill level
  const leadman=G.workers.find(w=>w.prof==="leadman"&&w.task!=="idle");
  const lv=leadman?leadman.lv:0;
  // Lv2+: antimony auto-added if available
  const autoAntimony = lv>=2;
  const hasAntimony=(G.res.antimony||0)>=1;
  const useAntimony=hasAntimony&&(autoAntimony||(G.res.antimony||0)>=1);
  G.res.lead -= needLead;
  G.res.tin  -= needTin;
  if(useAntimony){ G.res.antimony -= 1; }
  // Lv3+: batch cast — produce 2 typemetal for same cost
  const output = lv>=5?3:lv>=3?2:1;
  G.res.typemetal = (G.res.typemetal||0) + output;
  const notes=[];
  if(useAntimony) notes.push(L==="en"?"Sb hardened":"Sb tvrzená");
  if(output>1) notes.push(L==="en"?`batch ×${output}`:`dávka ×${output}`);
  const noteStr=notes.length?` (${notes.join(", ")})` : "";
  G.log.push(`__PROD__🔩 ${L==="en"?`${output}× type metal cast`:`${output}× liteřina odlita`}${noteStr}`);
  render();
}
function makeLetters(){

  G.res.typemetal -= 2; G.letters = Math.min(G.letters+2, 20);

// ── ILLUMINATION PRODUCTION ───────────────────────────────────
function illuminateWork(pigmentId){
  const L=G.lang;
  const pigment=ILLUMINATION_PIGMENTS[pigmentId];
  if(!pigment){ render(); return; }
  // Need illuminator
  const illuminator=G.workers.find(w=>w.prof==="illuminator"&&w.task!=="idle");
  if(!illuminator){
    showToast(L==="en"?"No Illuminator":"Žádný iluminátor",
      [L==="en"?"Hire an Illuminator from the Workers tab.":"Najmi iluminátora na záložce Parta."]);
    return;
  }
  // Need prepared vellum + a printed folio/luxury book
  if((G.res.prepared_vellum||0)<1){
    showToast(L==="en"?"Need prepared vellum":"Potřebuješ připravený pergamen",
      [L==="en"?"Prepare raw vellum first (vellum → prepared).":"Nejprve připrav surový pergamen."]);
    return;
  }
  if(G.gold<pigment.cost){
    showToast(L==="en"?"Not enough gold":"Nedostatek zlata",[`${pigment.cost}g ${L==="en"?"needed":"potřeba"}`]);
    return;
  }
  // Need a printed book to illuminate (folio preferred)
  const hasFolio=(G.printedBooks?.folio||[]).length>0;
  const hasQuarto=(G.printedBooks?.quarto||[]).length>0;
  if(!hasFolio&&!hasQuarto){
    showToast(L==="en"?"Need printed books":"Potřebuješ vytištěné knihy",
      [L==="en"?"Print a Folio or Quarto first, then illuminate it.":"Nejprve vytiskni Folio nebo Kvart."]);
    return;
  }
  // Consume
  G.res.prepared_vellum-=1;
  G.gold-=pigment.cost;
  // Take best quality book
  const sourceKey=hasFolio?"folio":"quarto";
  const sourceBooks=[...(G.printedBooks[sourceKey]||[])].sort((a,b)=>b-a);
  const baseQ=sourceBooks[0]||3;
  G.printedBooks[sourceKey]=sourceBooks.slice(1);
  // Quality roll — illuminator level + pigment
  const illumQ=clamp(baseQ+(illuminator.lv-1)*0.5+(Math.random()-.2), 1, 5);
  const finalQ=Math.round(illumQ);
  // Value: base book value × pigment bonus × quality multiplier × illuminator level
  const baseVal=BOOK_FORMATS[sourceKey].baseValue;
  const illumValue=Math.round(baseVal*pigment.colorBonus*(0.8+finalQ*0.1)*illuminator.lv*0.6);
  // Store as illuminated work
  if(!G.illuminatedWorks) G.illuminatedWorks=[];
  G.illuminatedWorks.push({
    pigment:pigmentId, quality:finalQ, value:illumValue,
    baseFormat:sourceKey, illuminator:illuminator.name
  });
  G.prestige+=finalQ+(illuminator.lv>=3?2:0);
  G.log.push(`__PROD__${pigment.icon} ${L==="en"?"Illuminated":"Iluminováno"}: ${BOOK_FORMATS[sourceKey].symbol} + ${L==="en"?pigment.en:pigment.cs} ${"★".repeat(finalQ)} · ~${illumValue}g`);
  showToast(L==="en"?"Illumination Complete":"Iluminace dokončena",
    [`${pigment.icon} ${L==="en"?pigment.en:pigment.cs} — ${"★".repeat(finalQ)}`,
     `${illuminator.name} · ~${illumValue}g`,
     `+${finalQ+(illuminator.lv>=3?2:0)} Prestige`]);
  render();
}

function sellIlluminatedWork(index){

  const work=G.illuminatedWorks[index];

  }
  G.gold-=patron.favorCost;
  if(!G.activePatrons) G.activePatrons=[];
  if(!G.activePatrons.includes(patronId)){
    G.activePatrons.push(patronId);
    G.log.push(`__ECO__${patron.icon} ${L==="en"?"Patron secured":"Mecenáš zajištěn"}: ${L==="en"?patron.name_en:patron.name_cs} (-${patron.favorCost}g)`);
    showToast(L==="en"?"Patron Secured":"Mecenáš zajištěn",
      [`${patron.icon} ${L==="en"?patron.name_en:patron.name_cs}`,
       L==="en"?patron.gift_en:patron.gift_cs,
       `+${Math.round((patron.bonus-1)*100)}% ${L==="en"?"on preferred orders":"na preferovaných zakázkách"}`]);
  } else {
    // Renewal
    G.log.push(`__ECO__${patron.icon} ${L==="en"?"Patron relationship renewed":"Vztah s mecenášem obnoven"} (-${patron.favorCost}g)`);
  }
  render();
}

// Apply patron bonus to order reward
function applyPatronBonus(order, baseReward){
  const patrons=getActivePatrons();
  let mult=1.0;
  PATRONS.forEach(patron=>{
    if(patrons.includes(patron.id)&&patron.pref.includes(order.type)){
      mult=Math.max(mult,patron.bonus);
    }
  });
  return Math.round(baseReward*mult);
}

const BASE_PRICES = {
  rags:1, lead:2, tin:2.5, antimony:3.5, soot:1, linseed_oil:1.5,
  paper:3, ink:3, typemetal:2, vellum:8,
};
// Seasonal price multiplier per round (0=Jan..11=Dec)
const SEASON_PRICE_MULT = [
  1.25,1.2,1.05,1.0,  // Winter — scarce
  1.0, 0.95,0.9,0.9,  // Summer — cheap
  1.0, 1.05,1.1,1.15  // Autumn/winter — rising
];

function initMarketPrices(){
  if(G.marketPrices) return;
  G.marketPrices={};
  G.priceHistory={};
  Object.keys(BASE_PRICES).forEach(k=>{
    G.marketPrices[k]=BASE_PRICES[k];
    G.priceHistory[k]=[];
  });
}

function updateMarketPrices(){
  initMarketPrices();
  const seasonMult=SEASON_PRICE_MULT[G.round]||1.0;
  Object.keys(BASE_PRICES).forEach(k=>{
    const base=BASE_PRICES[k];
    const stock=G.res[k]||0;
    const supplyMod=stock>8?0.88:stock>4?0.95:stock<2?1.12:1.0;
    const prev=G.marketPrices[k]||base;
    const noise=(Math.random()*0.24)-0.12;
    const raw=base*seasonMult*supplyMod*(1+noise);
    const maxDelta=prev*0.20;
    const next=clamp(raw,prev-maxDelta,prev+maxDelta);
    G.marketPrices[k]=Math.round(clamp(next,base*0.5,base*2.0)*10)/10;
    const hist=G.priceHistory[k]||[];
    hist.push(G.marketPrices[k]);
    if(hist.length>6) hist.shift();
    G.priceHistory[k]=hist;
  });
}

function getPriceTrend(key){
  const hist=G.priceHistory?.[key]||[];
  if(hist.length<2) return "stable";
  const cur=hist[hist.length-1];
  const avg=hist.slice(-3).reduce((s,v)=>s+v,0)/Math.min(hist.length,3);
  const pct=(cur-avg)/avg;
  if(pct>0.08) return "up";
  if(pct<-0.08) return "down";
  return "stable";
}

function upgradePress(){
  const L=G.lang;
  const curLv=G.pressLevel||1;
  if(curLv>=3){
    showToast(L==="en"?"Press Maxed":"Lis na max",
      [L==="en"?"Your press is already at peak capability.":"Lis je již na maximální úrovni."]);
    return;
  }
  const upg=PRESS_UPGRADES[curLv+1];
  // Check run-in requirement
  if((G.pressRunIn||0)<upg.req_runin){
    showToast(L==="en"?"Not Ready":"Není připraven",
      [L==="en"?`Press Run-In must be ≥${upg.req_runin}% (currently ${G.pressRunIn||0}%)`:
       `Obeznámenost musí být ≥${upg.req_runin}% (nyní ${G.pressRunIn||0}%)`]);

  }
  // Check gold
  if(G.gold<upg.cost_gold){
    showToast(L==="en"?"Not enough gold":"Nedostatek zlata",
      [`${L==="en"?"Need":"Potřeba"} ${upg.cost_gold}g`]);
    return;
  }
  // Check resources
  for(const [res,qty] of Object.entries(upg.cost_res)){

      showToast(L==="en"?"Missing materials":"Chybí materiál",
        [`${L==="en"?"Need":"Potřeba"} ${qty}× ${res}`]);
      return;

  // All good — apply upgrade
  G.gold -= upg.cost_gold;
  for(const [res,qty] of Object.entries(upg.cost_res)){
    G.res[res] = Math.max(0,(G.res[res]||0)-qty);
  }
  G.pressLevel = curLv+1;
  G.press_wear = 0; // fresh press resets wear
  G.log.push(`__PROD__⚙️ ${L==="en"?`Press upgraded to Lv${curLv+1}: ${upg.en}`:`Lis upgradován na Lv${curLv+1}: ${upg.cs}`} (-${upg.cost_gold}g)`);

     L==="en"?"Press wear reset to 0%":"Opotřebení lisu resetováno na 0%"]);

}

// ── ADVANCE ROUND ────────────────────────────────────────────
function advanceRound(){
  const p=G, L=p.lang;
  const round=p.round;
  const isPrep = round < PREP;
  const isLastRound = round >= ROUNDS_PER_YEAR-1;
  let gold=p.gold, mor=p.morale, debt=p.debt;
  const log=[...p.log];
  const evts=[];

  // 1. Worker tasks → resource production
  for(const w of p.workers){
    if(w.task==="idle") continue;
    const eff = clamp(w.lv * 0.6 + (1-w.fat)*0.4, 0.4, 1.4);
    if(w.task==="rags"){
      const ragAmt=Math.round(eff*(w.lv>=2?3:2));
      G.res.rags=(G.res.rags||0)+ragAmt;
      log.push(`__PROD__🧻 ${w.name}: +${ragAmt} rags`);
      // Lv3+: also produces soot
      if(w.lv>=3){ G.res.soot=(G.res.soot||0)+1; log.push(`__PROD__🖤 ${w.name}: +1 soot (lv3)`); }
      // Lv5+: also produces linseed oil
      if(w.lv>=5){ G.res.linseed_oil=(G.res.linseed_oil||0)+1; log.push(`__PROD__🫙 ${w.name}: +1 linseed oil (lv5)`); }
    }
    if(w.task==="lead")   { G.res.lead   = (G.res.lead||0)   + Math.round(eff*2); log.push(`__PROD__🔩 ${w.name}: +${Math.round(eff*2)} lead`); }
    if(w.task==="ink")    { G.res.ink    = (G.res.ink||0)    + Math.round(eff*1.5); log.push(`__PROD__⬛ ${w.name}: +${Math.round(eff*1.5)} ink`); }
    if(w.task==="paper")  { G.res.paper  = (G.res.paper||0)  + Math.round(eff*1); log.push(`__PROD__📄 ${w.name}: +${Math.round(eff*1)} paper`); }
    if(w.task==="compose"){ G.letters = Math.min(G.letters+1, 20); G.pressRunIn = Math.min(G.pressRunIn+3, 100); }
    if(w.task==="print")  { G.pressRunIn = Math.min(G.pressRunIn+5, 100); }
    if(w.task==="sell"){
      // Agent lv3+: Leipzig prices year-round (×1.5 instead of ×1)
      const isLeipzigRound=LEIPZIG_ROUNDS.includes(G.round);
      const agentMult=w.lv>=3&&!isLeipzigRound?1.5:w.lv>=5?2.0:1.0;
      const earned=Math.round(eff*3*agentMult);
      gold+=earned;
      log.push(`__ECO__💰 ${w.name}: +${earned}g selling${agentMult>1?" (agent bonus)":""}`);
    }
  }

  // 2. Letter wear
  const printingWorkers = p.workers.filter(w=>w.task==="print"||w.task==="compose").length;
  if(printingWorkers>0) G.letterWear = Math.min(G.letterWear+printingWorkers*3, 100);

  // 3. Press run-in decay if not printing
  if(printingWorkers===0 && isPrep) G.pressRunIn = Math.max(G.pressRunIn-5, 0);

  // 3b. Rotate market orders — 1-2 stale orders replaced each round
  rotateOrders();
  // 3c. Update dynamic market prices
  updateMarketPrices();

  // 3c. Process imprimatur requests (1 month delay)
  if(G.reformation) processImprimaturQueue();

  // 4. Order deadlines — expire, refund depositum penalty
  for(let i=G.activeOrders.length-1; i>=0; i--){
    const o=G.activeOrders[i];
    if(round >= o.deadline){
      G.activeOrders.splice(i,1);
      G.reputation = clamp(G.reputation-1, 0, 10);
      // Return depositum but deduct penalty (30% of advance, i.e. 9% of total)
      const penalty = Math.round((o.depositum||0) * 0.3);
      gold -= penalty;
      log.push(`__EVT__📜 ⚠️ ${L==="en"?"Order expired":"Zakázka vypršela"}: ${L==="en"?o.en:o.cs} · -${penalty}g ${L==="en"?"penalty":"penále"} · -1 ${L==="en"?"Rep":"Rep"}`);
    }
  }

  // 5. Beer/morale
  const BEER=[{m:0,cost:0},{m:5,cost:1},{m:8,cost:2},{m:10,cost:3}];
  const beer=BEER[p.beer]; mor+=beer.m;
  const bCost=beer.cost*Math.ceil(p.workers.length/3); gold-=bCost;

  // 6. Wages
  let wages=0;
  p.workers.forEach(w=>{ wages += w.task==="idle"?0:(2+(w.wageMod||0)); });
  const wagesPaid=Math.min(wages, Math.max(0,gold));
  const wagesDeficit=wages-wagesPaid;
  gold -= wagesPaid;
  if(wagesDeficit>0){ debt+=wagesDeficit; mor-=8; log.push(`__EVT__💸 ⚠️ ${L==="en"?"Wages unpaid":"Mzdy nezaplaceny"}: ${wagesDeficit}g → debt`); }

  // 7. Debt auto-repay
  if(debt>0&&gold>5){ const pay=Math.min(5,gold-2,debt); gold-=pay; debt-=pay; }

  // 8. Worker fatigue & XP
  const hasUcitel = p.workers.some(w=>w.traits?.includes("ucitel")&&w.task!=="idle");
  const wk = p.workers.map(w=>{
    const working=w.task!=="idle";
    // Fatigue: working = +0.08/round (vytrvalec: +0.04), resting = −0.5/round (full recovery in ≤2 rounds)
    const fatGain = working ? (w.traits?.includes("vytrvalec")?0.04:0.08) : -0.5;
    const newFat = clamp((w.fat||0)+fatGain, 0, 1);
    const xpGain = working ? (Math.round((w.lv*2+2)*(hasUcitel?1.25:1))) : 0;
    const newXp = (w.xp||0)+xpGain;
    const needed = XP_PER_LEVEL[w.lv-1]||999;
    let newLv=w.lv, finalXp=newXp;
    if(newXp>=needed&&w.lv<5){ newLv=w.lv+1; finalXp=0; log.push(`__EVT__⭐ ${w.name} ${L==="en"?"leveled up":"postoupil na"} ★×${newLv}`); }
    const loyMod = wagesDeficit>0?-3:working?1:0;
    return {...w, fat:newFat, xp:finalXp, lv:newLv, loyalty:clamp((w.loyalty||75)+loyMod,0,100)};
  });
  G.workers=wk;

  // 9. Format unlocks check — after each round
  checkFormatUnlocks();

  // 9b. Kolofon prestige trickle — completed orders spread the workshop's name
  // Each completed order this year has a small chance to +1 reputation
  const completedThisRound = p.completedOrders - (p._prevCompletedOrders||0);
  G._prevCompletedOrders = p.completedOrders;
  if(completedThisRound > 0 && Math.random() < 0.25){
    G.reputation = clamp(G.reputation+1, 0, 10);
    log.push(`__EVT__📣 ${L==="en"?"Word of the press spreads — Reputation +1":"Pověst tiskárny roste — Reputace +1"}`);
  }

  // 9b. Humor event
  const beerLvl=p.beer||0;
  const beerChance=[0.04,0.12,0.25,0.45][Math.min(beerLvl,3)];
  if(Math.random()<beerChance){
    const r2=Math.random();
    if(r2<0.5){ const h=HUMOR_NEUTRAL[Math.floor(Math.random()*HUMOR_NEUTRAL.length)]; log.push(`__FLAVOR__😄 ${h}`); }
    else if(r2<0.75){
      const ev=HUMOR_BAD[Math.floor(Math.random()*HUMOR_BAD.length)];
      log.push(`__FLAVOR__🍺😬 ${ev.cs}`);
      if(ev.effect==="gold") gold+=ev.val;
      else if(ev.effect==="ink") G.res.ink=Math.max(0,(G.res.ink||0)+ev.val);
      else if(ev.effect==="paper") G.res.paper=Math.max(0,(G.res.paper||0)+ev.val);
      else if(ev.effect==="morale") mor+=ev.val;
    } else {
      const ev=HUMOR_GOOD[Math.floor(Math.random()*HUMOR_GOOD.length)];
      log.push(`__FLAVOR__🍺😊 ${ev.cs}`);
      if(ev.effect==="morale") mor+=ev.val;
      else if(ev.effect==="rags") G.res.rags=(G.res.rags||0)+ev.val;
      else if(ev.effect==="ink") G.res.ink=(G.res.ink||0)+ev.val;
    }
  }

  // 10. Chronicle
  const flavor=isPrep?CHRON_PREP_EN[round%CHRON_PREP_EN.length]:CHRON_CAMP_EN[(round-PREP)%CHRON_CAMP_EN.length];
  log.push(`__FLAVOR__📖 ${flavor}`);

  // 11. Random events
  if(G.letterWear>=85&&Math.random()<0.4){ evts.push("typeWorn"); mor-=8; }
  if(G.res.paper<=0&&printingWorkers>0){ evts.push("noPaper"); mor-=5; }
  // Press wear accumulates each round with active printing workers
  if(printingWorkers>0){
    // Printer lv2: wear +5 instead of +7; lv5: no wear
    const bestPrinter=p.workers.filter(w=>w.prof==="printer"&&w.task!=="idle").sort((a,b)=>b.lv-a.lv)[0];
    const printerLv=bestPrinter?bestPrinter.lv:0;
    // Press Lv3: +3/round, Lv2: +5/round, Lv1: +7/round (better press = less wear per run)
    const pressLvWear=p.pressLevel>=3?3:p.pressLevel>=2?5:7;
    const wearAdd=printerLv>=5?0:printerLv>=2?Math.max(3,pressLvWear-2):pressLvWear;
    G.press_wear = Math.min(100, (G.press_wear||0) + wearAdd);
    if(G.press_wear>=80 && G.press_wear<90){
      log.push(`__EVT__⚠️ ${L==="en"?"Press screw getting stiff — lubricate soon ("+G.press_wear+"%)":"Šroub lisu tuhnoucí — promazej brzy ("+G.press_wear+"%)"}`);
    }
    if(G.press_wear>=90){
      log.push(`__EVT__🔴 ${L==="en"?"Press badly worn — output −1 quality until lubricated":"Lis silně opotřeben — výstup −1 kvalita dokud se nepromaže"}`);
    }
  }
  if(isLastRound) evts.push("yearEnd");

  mor=clamp(mor,0,100); gold=Math.max(0,gold);
  const nr=(round+1)%ROUNDS_PER_YEAR;

  Object.assign(G,{
    round:nr, log, morale:mor, gold, debt,
    summary:{wages,wagesPaid,wagesDeficit,bCost,goldDelta:gold-p.gold,morDelta:mor-p.morale},
    events:evts.slice(1), curEvt:evts[0]||null,
    phase: evts.length?"event":(isLastRound?"interseasonPhase":"summary")
  });

  // Toast
  const toastTitle=`${MONTH_NAMES_EN[round]} · ${isPrep?"Prep":"Press"}`;
  const tL=[];
  tL.push(`💰 ${gold}g (${gold-p.gold>=0?"+":""}${gold-p.gold}g)`);
  if(wages>0) tL.push(`💸 -${wages}g wages`);
  if(G.letterWear>60) tL.push(`⚠️ Type worn ${G.letterWear}%`);
  if(G.pressRunIn>0) tL.push(`🖨️ Press ${G.pressRunIn}% run-in`);
  showToast(toastTitle, tL);
  autoSave(); render();
}

// ── INTERSEASON ───────────────────────────────────────────────
function startInterseason(){
  const p=G;
  // Press run-in decays between years
  G.pressRunIn = Math.round(p.pressRunIn*0.7);
  // Press wear decays slightly over winter (cold contracts metal, worker maintains it)
  G.press_wear = Math.max(0, Math.round((p.press_wear||0)*0.6));
  // Letter wear recovers partially if you have a lead-caster
  const hasLeadman = p.workers.some(w=>w.prof==="leadman"&&w.task!=="idle");
  G.letterWear = Math.max(0, p.letterWear - (hasLeadman?25:10));
  // New orders for the market — full fresh pool at year start
  G.availOrders = genOrderPool(p.gameYear+1, 5);
  // Candidates
  const cands = genCandidates(p.gameYear+1, 3+Math.floor(Math.random()*2));
  G.interseason = {
    candidates: cands,
    pressCarryover: G.pressRunIn,
    yearScore: { prestige:p.prestige, gold:p.gold, orders:p.completedOrders },
  };
  G.gameYear += 1;
  G.year += 1;
  G.totalYears += 1;
  G.round = 0;
  G.phase = "interseason";
  // Reset yearly Turkish threat flag
  G.histEvents = (G.histEvents||[]).filter(e=>e!=="turkish_this_year");
  G._vellumSurcharge = 0;
  G.log.push(`__EVT__📅 === ${G.year} · Anno Domini ===`);
  // Turkish threat (random, historical)
  triggerTurkishThreat();
  // Check if a historical event fires this year
  checkHistEvents();
  render();
}

function endInterseason(){
  G.phase="playing";
  G.morale=clamp(G.morale+10,0,100);
  G.log.push(`__EVT__🌿 ${G.lang==="en"?"New year begins — press ready":"Nový rok začíná — lis připraven"}: ${G.year}`);
  autoSave(); render();
}

// ── TOAST ─────────────────────────────────────────────────────
let _toastTimer=null;
function showToast(title, lines){
  let tc=document.getElementById("toastContainer");
  if(!tc){tc=document.createElement("div");tc.id="toastContainer";tc.className="toast-container";document.body.appendChild(tc);}
  tc.innerHTML="";
  const t=document.createElement("div");t.className="toast";
  if(title){const tl=document.createElement("div");tl.className="toast-title";tl.textContent=title;t.appendChild(tl);}
  (lines||[]).filter(Boolean).slice(0,8).forEach(l=>{const d=document.createElement("div");d.textContent=l;t.appendChild(d);});
  tc.appendChild(t);
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{if(tc)tc.innerHTML="";},6000);
}

function spawnPills(evt,task){
  const pill=document.createElement("div");
  pill.className="task-pill pos";
  pill.textContent=TASK_ICON[task]||"✓";
  pill.style.left=evt.clientX+"px";
  pill.style.top=evt.clientY+"px";
  document.body.appendChild(pill);
  setTimeout(()=>pill.remove(),900);
}

function sellResource(key, qty, unitPrice){
  const have=G.res[key]||0;
  if(have<=0) return;
  const selling=Math.min(qty,have);
  const earned=Math.round(selling*unitPrice);
  G.res[key]=have-selling;
  G.gold+=earned;
  G.log.push(`__ECO__💰 Sold ${selling}× ${key} → +${earned}g`);
  render();
}

// ── VIRTUAL DOM ───────────────────────────────────────────────
const app=document.getElementById("app");
function h(tag,attrs,...kids){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  kids.flat(9).forEach(c=>{if(c!=null)el.append(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);});
  return el;
}
// Track previous pill values for flash detection
const _prevPillVals = {};

function pill(emoji,val,cls){return h("span",{class:"pill"+(cls?" "+cls:"")},emoji," ",h("strong",null,val));}
function pillTip(emoji,val,cls,tipHtml,flashKey){
  const w=h("span",{class:"pill-tip"});
  // Determine flash class from value change
  let extraCls = cls||"";
  if(flashKey!==undefined){
    const prev=_prevPillVals[flashKey];
    const cur=typeof val==="string"?parseFloat(val)||0:val;
    if(prev!==undefined && cur!==prev){
      extraCls += (cur>prev?" pill-flash-gain":" pill-flash-lose");
    }
    _prevPillVals[flashKey]=cur;
  }
  // Critical pulse — low resources
  if(flashKey==="paper"&&(typeof val==="number"?val:parseFloat(val)||0)<2) extraCls+=" pill-critical";
  if(flashKey==="ink"  &&(typeof val==="number"?val:parseFloat(val)||0)<1) extraCls+=" pill-critical";
  if(flashKey==="gold" &&(typeof val==="number"?val:parseFloat(val)||0)<3) extraCls+=" pill-critical";
  if(flashKey==="letters"&&(typeof val==="number"?val:parseFloat(val)||0)<2) extraCls+=" pill-critical";
  const pillEl=h("span",{class:"pill"+(extraCls?" "+extraCls.trim():"")},emoji," ",h("strong",null,val));
  w.append(pillEl);
  if(tipHtml){const t=document.createElement("span");t.className="ptip";t.innerHTML=tipHtml;w.append(t);}
  return w;
}
function bar(val,max,color){
  return h("div",{class:"bar-track"},h("div",{class:"bar-fill",style:{width:clamp(val/max*100,0,100)+"%",background:color}}));
}
