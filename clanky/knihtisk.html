             `${L==="en"?"Requires":"Vyžaduje"}: Year ${fmt.unlockYear}, Lv${fmt.compositorMinLevel}${fmt.requiresItalic?" + 🖊️ Italic":""}`]);
            return; }
          G.currentFormat=fmt.id; render();
        }},
        `${fmt.icon} ${fmt.symbol}`+(unlocked?"":" 🔒"));
      fmtSelectRow.append(btn);
    });
    fmtSec.append(fmtSelectRow);

    // Selected format detail
    const selFmt=BOOK_FORMATS[p.currentFormat||"folio"];
    const compLv=getCompositorLevel();
    const canPrint=
      G.res.paper>=selFmt.paperCost &&
      G.res.ink>=selFmt.inkCost &&
      G.letters>=2 &&
      (!selFmt.requiresItalic||(G.italic_type||0)>=2);
    const impRisk=compLv<selFmt.compositorMinLevel?selFmt.impositionRisk:0;
    const fmtDetail=h("div",{style:{
      padding:"10px",border:`1px solid ${canPrint?"rgba(42,90,42,.3)":"var(--border2)"}`,
      background:canPrint?"rgba(42,90,42,.04)":"rgba(0,0,0,.02)",marginBottom:"6px"
    }});
    fmtDetail.append(
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"6px"}},
        h("div",null,
          h("div",{style:{fontSize:"16px",fontWeight:"700",letterSpacing:"1px"}},
            `${selFmt.icon} ${selFmt.symbol} — ${L==="en"?selFmt.en:selFmt.cs}`),
          h("div",{style:{fontSize:"10px",color:"#888",marginTop:"2px"}},
            L==="en"?selFmt.desc_en:selFmt.desc_cs)),
        h("div",{style:{textAlign:"right",flexShrink:0,marginLeft:"8px"}},
          h("div",{style:{fontSize:"18px",fontWeight:"700",color:"var(--gold)"}},
            `${selFmt.baseValue*selFmt.outputMult}g`),
          h("div",{style:{fontSize:"9px",color:"#555"}},
            `${selFmt.outputMult>1?selFmt.outputMult+"× ":""}${selFmt.prestigeValue*selFmt.outputMult}P`))),
      // Cost row
      h("div",{style:{display:"flex",gap:"8px",fontSize:"11px",marginBottom:"8px",flexWrap:"wrap"}},
        h("span",{style:{color:G.res.paper>=selFmt.paperCost?"#88cc88":"#ff9999"}},
          `📄 ${G.res.paper}/${selFmt.paperCost}`),
        h("span",{style:{color:G.res.ink>=selFmt.inkCost?"#88cc88":"#ff9999"}},
          `⬛ ${G.res.ink}/${selFmt.inkCost}`),
        h("span",{style:{color:G.letters>=2?"#88cc88":"#ff9999"}},
          `🔠 ${G.letters} sets`),
        selFmt.requiresItalic?h("span",{style:{color:(G.italic_type||0)>=2?"#88cc88":"#ff9999"}},
          `🖊️ ${G.italic_type||0}/2`):""),
      // Imposition risk
      impRisk>0?h("div",{style:{fontSize:"10px",color:"#c9952b",marginBottom:"6px",
        padding:"4px 6px",border:"1px solid rgba(201,149,43,.2)",background:"rgba(201,149,43,.04)"}},
        `⚠️ ${L==="en"?"Imposition risk":"Riziko impozice"}: ${Math.round(impRisk*100)}% — ${L==="en"?"hire Lv":"najmi Lv"}${selFmt.compositorMinLevel}+ ${L==="en"?"Compositor":"Sazeče"}`
      ):"",
      // Output preview
      h("div",{style:{fontSize:"10px",color:"#888",marginBottom:"8px"}},
        L==="en"
          ?`1 print run → ${selFmt.outputMult} book(s) · sells for ~${selFmt.baseValue}g each · +${selFmt.prestigeValue}P each`
          :`1 tiskový běh → ${selFmt.outputMult} kniha/knih · prodej ~${selFmt.baseValue}g každá · +${selFmt.prestigeValue}P každá`),
      h("button",{class:"btn btn-p"+(canPrint?"":" "),
        style:{width:"100%",opacity:canPrint?1:.45,fontSize:"12px",padding:"7px",letterSpacing:"1px"},
        onClick:()=>{if(canPrint)printRun(p.currentFormat);}},
        canPrint
          ?(L==="en"?`PRINT ${selFmt.symbol} →`:`TISKNOUT ${selFmt.symbol} →`)
          :(L==="en"?"Insufficient materials":"Nedostatek materiálu")));
    fmtSec.append(fmtDetail);

    // Italic type purchase (if not yet have enough)
    if(!p.formatUnlocks.includes("octavo")||(G.italic_type||0)<2){
      const italicCard=h("div",{style:{padding:"8px",border:"1px solid rgba(201,149,43,.2)",
        background:"rgba(201,149,43,.04)",marginBottom:"6px"}});
      italicCard.append(
        h("div",{style:{fontSize:"11px",fontWeight:"700",marginBottom:"3px"}},
          `🖊️ ${L==="en"?"Italic Type (Aldus Manutius style)":"Kurzívní litery (styl Alda Manzia)"}`),
        h("div",{style:{fontSize:"10px",color:"#888",marginBottom:"6px"}},
          L==="en"
            ?"The new slanted typeface from Venice. Required to unlock Octavo (8°) format — doubles your book output per sheet."
            :"Nový šikmý písmo z Benátek. Nutné pro odemčení formátu Oktáv (8°) — zdvojnásobí výstup knih na arch."),
        h("div",{style:{display:"flex",gap:"6px",alignItems:"center"}},
          h("span",{style:{fontSize:"11px",color:"#888"}},`${L==="en"?"In stock":"Na skladě"}: ${G.italic_type||0} ${L==="en"?"sets":"sad"}`),
          h("button",{class:"btn btn-s"+(G.gold>=18?" btn-p":""),
            style:{opacity:G.gold>=18?1:.4},
            onClick:()=>buyItalicType()},
            `${L==="en"?"Buy Italic (+2 sets)":"Koupit kurzívu (+2 sady)"} — 18g`)));
      fmtSec.append(italicCard);
    }

    // Printed books in stock — sell them
    const booksInStock=p.printedBooks&&Object.entries(p.printedBooks).some(([k,v])=>v&&v.length>0);
    if(booksInStock){
      const stockSec=h("div",{style:{marginTop:"8px"}});
      stockSec.append(h("div",{style:{fontSize:"9px",textTransform:"uppercase",letterSpacing:"1.5px",
        color:"var(--red)",fontWeight:"700",marginBottom:"6px"}},
        L==="en"?"Printed Books in Stock":"Vytištěné knihy na skladě"));
      Object.entries(p.printedBooks).forEach(([fid,books])=>{
        if(!books||!books.length) return;
        const fmt=BOOK_FORMATS[fid];
        if(!fmt) return;
        const avgQ=Math.round(books.reduce((s,q)=>s+q,0)/books.length);
        const row=h("div",{class:"sell-item-row"});
        row.append(
          h("div",{style:{display:"flex",gap:"6px",alignItems:"center",flex:1}},
            h("span",{style:{fontSize:"16px"}},fmt.icon),
            h("div",null,
              h("div",{class:"sell-item-name"},`${fmt.symbol} ${L==="en"?fmt.en:fmt.cs}`),
              h("div",{class:"sell-item-qty"},`${books.length}× · avg ${"★".repeat(avgQ)}`))),
          h("div",{style:{display:"flex",gap:"4px",alignItems:"center"}},
            h("span",{class:"sell-item-price"},`~${fmt.baseValue}g${LEIPZIG_ROUNDS.includes(p.round)?" 🏪":""}/ea`),
            h("button",{class:"btn btn-s",onClick:()=>sellBooks(fid,1)},"1×"),
            h("button",{class:"btn btn-s btn-p",onClick:()=>sellBooks(fid,999)},
              L==="en"?"All":"Vše")));
        stockSec.append(row);
      });
      fmtSec.append(stockSec);
    }
    content.append(fmtSec);

    // ── ILLUMINATION WORKSHOP ──
    const hasIllum=p.workers.some(w=>w.prof==="illuminator");
    const illumSec=h("div",{class:"sec"});
    illumSec.append(h("div",{class:"sec-title"},`🎨 ${L==="en"?"Illumination Workshop":"Iluminátorská dílna"}`));

    if(!hasIllum){
      illumSec.append(h("div",{style:{fontSize:"11px",color:"#555",fontStyle:"italic",marginBottom:"8px"}},
        L==="en"
          ?"No illuminator in workshop. Hire Magdalena or Mistr Rufus from the Workers tab."
          :"Žádný iluminátor v dílně. Najmi Magdalenu nebo Mistra Rufuse na záložce Parta."));
    } else {
      // Vellum chain
      illumSec.append(h("div",{style:{fontSize:"10px",color:"#888",marginBottom:"8px",lineHeight:"1.6"}},
        L==="en"
          ?"Chain: Raw Vellum → Prepare → Illuminate with pigment → Sell for 3–10× base price"
          :"Řetězec: Surový pergamen → Připravit → Iluminovat pigmentem → Prodat za 3–10× základní cenu"));

      // Vellum prep
      const canPrep=(G.res.vellum||0)>=1;
      illumSec.append(
        h("div",{style:{display:"flex",alignItems:"center",gap:"8px",
          padding:"7px",border:`1px solid ${canPrep?"rgba(201,149,43,.3)":"var(--border)"}`,
          background:"rgba(0,0,0,.02)",marginBottom:"6px"}},
          h("div",{style:{flex:1}},
            h("div",{style:{fontWeight:"700",fontSize:"11px"}},`📜→📜✨ ${L==="en"?"Prepare Vellum":"Připravit pergamen"}`),
            h("div",{style:{fontSize:"9px",color:"#666"}},
              `${L==="en"?"Scrape & stretch":"Škrábat a natáhnout"} · 1 ${L==="en"?"vellum":"pergamen"} → 1 ${L==="en"?"prepared":"připravený"} · ${L==="en"?"Stock":"Zásoby"}: ${G.res.vellum||0} raw, ${G.res.prepared_vellum||0} ${L==="en"?"prepared":"připravených"}`)),
          h("button",{class:"btn btn-s"+(canPrep?" btn-p":""),
            style:{opacity:canPrep?1:.4},onClick:()=>{if(canPrep)prepareVellum();}},
            L==="en"?"Prepare":"Připravit")));

      // Pigment selector + illuminate
      const canIllum=(G.res.prepared_vellum||0)>=1&&
        ((G.printedBooks?.folio||[]).length>0||(G.printedBooks?.quarto||[]).length>0);
      illumSec.append(h("div",{style:{fontSize:"9px",color:"var(--red)",
        textTransform:"uppercase",letterSpacing:"1px",fontWeight:"700",marginBottom:"5px"}},
        L==="en"?"Choose Pigment":"Vyberte pigment"));
      const pigGrid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px",marginBottom:"6px"}});
      Object.entries(ILLUMINATION_PIGMENTS).forEach(([pid,pg])=>{
        const canBuy=G.gold>=pg.cost;
        const card=h("div",{style:{padding:"6px",border:`1px solid ${canIllum&&canBuy?"rgba(201,149,43,.3)":"var(--border)"}`,
          background:canIllum&&canBuy?"rgba(201,149,43,.04)":"rgba(0,0,0,.02)"}});
        card.append(
          h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"3px"}},
            h("span",{style:{fontSize:"12px"}},pg.icon),
            h("span",{style:{fontSize:"10px",color:"var(--gold)",fontWeight:"700"}},`${pg.cost}g`)),
          h("div",{style:{fontSize:"10px",fontWeight:"700",marginBottom:"1px"}},L==="en"?pg.en:pg.cs),
          h("div",{style:{fontSize:"9px",color:"#666",marginBottom:"5px"}},
            `×${pg.colorBonus} ${L==="en"?"value":"hodnota"}`),
          h("button",{class:"btn btn-s"+(canIllum&&canBuy?" btn-p":""),
            style:{width:"100%",opacity:canIllum&&canBuy?1:.35,fontSize:"9px"},
            onClick:()=>{if(canIllum&&canBuy)illuminateWork(pid);}},
            canIllum&&canBuy?(L==="en"?"Illuminate":"Iluminovat"):(L==="en"?"Cannot":"Nelze")));
        pigGrid.append(card);
      });
      illumSec.append(pigGrid);
      if(!canIllum){
        illumSec.append(h("div",{style:{fontSize:"10px",color:"#555",fontStyle:"italic"}},
          L==="en"?"Need prepared vellum + a printed Folio/Quarto to illuminate."
                  :"Potřebuješ připravený pergamen + vytištěné Folio/Kvart."));
      }
    }

    // Illuminated works in stock
    if(p.illuminatedWorks&&p.illuminatedWorks.length>0){
      illumSec.append(h("div",{style:{marginTop:"8px",borderTop:"1px solid var(--border)",paddingTop:"8px"}},
        h("div",{style:{fontSize:"9px",color:"var(--red)",textTransform:"uppercase",
          letterSpacing:"1px",fontWeight:"700",marginBottom:"5px"}},
          L==="en"?"Illuminated Works — For Sale":"Iluminovaná díla — K prodeji"),
        ...p.illuminatedWorks.map((work,idx)=>{
          const pg=ILLUMINATION_PIGMENTS[work.pigment];
          const fmt=BOOK_FORMATS[work.baseFormat];
          return h("div",{style:{display:"flex",alignItems:"center",gap:"8px",
            padding:"6px",border:"1px solid rgba(201,149,43,.2)",
            background:"rgba(201,149,43,.04)",marginBottom:"4px"}},
            h("span",{style:{fontSize:"16px"}},pg?.icon||"🎨"),
            h("div",{style:{flex:1}},
              h("div",{style:{fontSize:"11px",fontWeight:"700"}},
                `${fmt?.symbol||""} + ${L==="en"?pg?.en:pg?.cs} ${"★".repeat(work.quality)}`),
              h("div",{style:{fontSize:"9px",color:"#888"}},
                `${work.illuminator} · ~${work.value}g`)),
            h("button",{class:"btn btn-s btn-p",
              onClick:()=>sellIlluminatedWork(idx)},
              L==="en"?"Sell":"Prodat"));
        })));
    }

    content.append(illumSec);

    // ── PATRON RELATIONS ──
    const availPatrons=PATRONS.filter(pat=>p.reputation>=pat.rep_req);
    if(availPatrons.length>0){
      const patronSec=h("div",{class:"sec"});
      patronSec.append(h("div",{class:"sec-title"},`🤝 ${L==="en"?"Patrons":"Mecenáši"}`));
      availPatrons.forEach(patron=>{
        const isActive=(p.activePatrons||[]).includes(patron.id);
        const canAfford=G.gold>=patron.favorCost;
        const card=h("div",{style:{
          padding:"8px",marginBottom:"5px",
          border:`1px solid ${isActive?"rgba(201,149,43,.3)":"var(--border2)"}`,
          background:isActive?"rgba(201,149,43,.04)":"rgba(0,0,0,.02)",
        }});
        card.append(
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"4px"}},
            h("div",null,
              h("div",{style:{fontWeight:"700",fontSize:"11px"}},
                `${patron.icon} ${L==="en"?patron.name_en:patron.name_cs}`),
              h("div",{style:{fontSize:"9px",color:isActive?"var(--gold)":"#555",marginTop:"2px"}},
                isActive
                  ?`✓ ${L==="en"?"Active — ":""} +${Math.round((patron.bonus-1)*100)}% ${L==="en"?"on":"na"} ${patron.pref.join(", ")}`
                  :`${patron.pref.join(", ")} · +${Math.round((patron.bonus-1)*100)}% ${L==="en"?"bonus":"bonus"}`),
              h("div",{style:{fontSize:"9px",color:"#666",fontStyle:"italic",marginTop:"2px",lineHeight:"1.4"}},
                L==="en"?patron.gift_en:patron.gift_cs)),
            h("button",{class:"btn btn-s"+(isActive?"":canAfford?" btn-p":""),
              style:{opacity:canAfford?1:.4,flexShrink:0,marginLeft:"8px"},
              onClick:()=>maintainPatron(patron.id)},
              `${isActive?(L==="en"?"Renew":"Obnovit"):(L==="en"?"Secure":"Zajistit")} ${patron.favorCost}g`)));
        patronSec.append(card);
      });
      content.append(patronSec);
    }

    // ── MATERIALS PRODUCTION ──
    const prodSec=h("div",{class:"sec"});
    prodSec.append(h("div",{class:"sec-title"},L==="en"?"Materials":"Suroviny"));
    const prodGrid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px"}});
    [
      {label:L==="en"?"Rags → Paper":"Hadry → Papír", icon:"🧻→📄",
       desc:L==="en"?"4 rags → 1 paper sheet":"4 hadry → 1 arch",
       have:G.res.rags>=4, action:()=>producePaper()},
      {label:L==="en"?"Pb+Sn → Type Metal":"Pb+Sn → Liteřina", icon:"🔩→⚙️",
       desc:L==="en"?"2 lead + 1 tin (+ Sb) → 1 typemetal":"2 olovo + 1 cín (+ Sb) → 1 liteřina",
       have:(G.res.lead||0)>=2&&(G.res.tin||0)>=1, action:()=>castType()},
      {label:L==="en"?"Type Metal → Letters":"Liteřina → Litery", icon:"⚙️→🔠",
       desc:L==="en"?"2 type metal → +2 letter sets":"2 liteřiny → +2 sady",
       have:(G.res.typemetal||0)>=2, action:()=>makeLetters()},
      {label:L==="en"?"Mix Ink":"Namíchat inkoust", icon:"🖤→⬛",
       desc:L==="en"?"1 soot + 1 linseed oil → 3 ink":"1 saze + 1 olej → 3 inkoust",
       have:(G.res.soot||0)>=1&&(G.res.linseed_oil||0)>=1, action:()=>mixInk()},
      {label:L==="en"?"Lubricate Press":"Promazat lis", icon:"🛢️→⚙️",
       desc:L==="en"?"1 linseed oil → press wear −35%":"1 lněný olej → opotřebení lisu −35%",
       have:(G.res.linseed_oil||0)>=1, action:()=>lubricatePress()},
    ].forEach(({label,icon,desc,have,action})=>{
      const card=h("div",{style:{padding:"7px",border:`1px solid ${have?"rgba(42,90,42,.3)":"var(--border)"}`,
        background:have?"rgba(42,90,42,.04)":"rgba(0,0,0,.02)"}});
      card.append(
        h("div",{style:{fontSize:"11px",marginBottom:"2px",fontWeight:"700"}},icon+" "+label),
        h("div",{style:{fontSize:"9px",color:"#666",marginBottom:"5px"}},desc),
        h("button",{class:"btn btn-s"+(have?" btn-p":""),style:{width:"100%",opacity:have?1:.4},
          onClick:()=>{if(have)action();}},
          have?(L==="en"?"Make":"Vyrobit"):(L==="en"?"Need more":"Nedostatek")));
      prodGrid.append(card);
    });
    prodSec.append(prodGrid);
    content.append(prodSec);

    // ── WORKER TASK ASSIGNMENT ──
    const taskSec=h("div",{class:"sec"});
    taskSec.append(h("div",{class:"sec-title"},L==="en"?"Assign Tasks":"Přidělit úkoly"));
    if(p.workers.length===0){
      taskSec.append(h("div",{style:{fontSize:"11px",color:"#555",fontStyle:"italic"}},
        L==="en"?"No workers hired yet.":"Žádní dělníci."));
    } else {
      const wGrid=isDesktop?h("div",{class:"workers-grid"}):h("div",null);
      p.workers.forEach(w=>{
        const fatPct=Math.round((w.fat||0)*100);
        const fatColor=w.fat>.7?"#cc0000":w.fat>.4?"#c9952b":"#3a7a3a";
        const crd=h("div",{class:"worker-card"});
        const npc=NPC_ROSTER.find(n=>n.id===w.npcId);
        // Portrait — clicking opens hero modal
        const portrait=h("div",{style:{flexShrink:0,width:"40px",height:"40px",background:"var(--bg)",border:"1px solid var(--border)",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",cursor:"pointer"},
          onClick:()=>openHeroModal(w.id)},
          w.prof==="compositor"?"🔠":w.prof==="printer"?"🖨️":w.prof==="engraver"?"✂️":w.prof==="corrector"?"🔍":w.prof==="agent"?"🗺️":"👤");
        crd.append(
          h("div",{style:{display:"flex",gap:"6px",alignItems:"flex-start",marginBottom:"5px"}},
            portrait,
            h("div",{style:{flex:1,minWidth:0}},
              h("div",{style:{fontWeight:"700",fontSize:"11px"}},w.name+" "+"★".repeat(w.lv)),
              h("div",{style:{fontSize:"9px",color:"#666",marginBottom:"1px"}},L==="en"?PROF_EN[w.prof]:PROF_CS[w.prof]),
              (w.prof==="compositor"||w.prof==="printer")?
                h("div",{style:{fontSize:"8px",color:w.lv>=selFmt.compositorMinLevel?"#88cc88":"#c9952b"}},
                  `${selFmt.symbol}: ${w.lv>=selFmt.compositorMinLevel?(L==="en"?"✓ Ready":"✓ Připraven"):(L==="en"?`Needs Lv${selFmt.compositorMinLevel}`:`Vyžaduje Lv${selFmt.compositorMinLevel}`)}`)
                :"",
              npc?h("div",{style:{fontSize:"8px",fontStyle:"italic",color:"#555",marginTop:"1px"}},
                `"${L==="en"?npc.quote_en:npc.quote_cs}"`):"")));
        [{label:L==="en"?"Fat.":"Únava",v:fatPct,c:fatColor},
         {label:"XP",v:Math.round(((w.xp||0)/((XP_PER_LEVEL[w.lv-1])||100))*100),c:"#c9952b"},
         {label:L==="en"?"Loy.":"Loj.",v:w.loyalty||75,c:(w.loyalty||75)>60?"#3a7a3a":(w.loyalty||75)>35?"#c9952b":"#8b0000"},
        ].forEach(({label,v,c})=>{
          crd.append(h("div",{style:{display:"flex",alignItems:"center",gap:"3px",marginBottom:"2px"}},
            h("span",{style:{fontSize:"8px",color:"#555",width:"24px",flexShrink:0}},label),
            h("div",{style:{flex:1,height:"3px",background:"rgba(255,255,255,.06)"}},
              h("div",{style:{width:v+"%",height:"100%",background:c}})),
            h("span",{style:{fontSize:"8px",color:c,width:"22px",textAlign:"right",flexShrink:0}},v+"%")));
        });
        const tasks=ROLE_TASKS[w.prof]||["idle"];
        const btnRow=h("div",{style:{display:"flex",gap:"2px",flexWrap:"wrap",marginTop:"5px"}});
        tasks.forEach(t=>{
          const isActive=w.task===t;
          btnRow.append(h("button",{
            class:"btn btn-s"+(isActive?" btn-active":""),
            style:{fontSize:"9px",padding:"2px 5px"},
            onClick:(evt)=>{spawnPills(evt,t);G.workers.find(x=>x.id===w.id).task=t;render();}},
            `${TASK_ICON[t]||""} ${L==="en"?TASK_EN[t]:TASK_CS[t]}`));
        });
        if(!w.traits?.includes("houzevatny")){
          btnRow.append(h("button",{class:"btn btn-s btn-danger",
            style:{fontSize:"9px",padding:"2px 5px",marginLeft:"auto"},
            onClick:(e)=>{e.stopPropagation();fireWorker(w.id);}},
            L==="en"?"✕":"✕"));
        }
        crd.append(btnRow);
        wGrid.append(crd);
      });
      taskSec.append(wGrid);
    }
    content.append(taskSec);

  // ── TAB: MARKET ──
  } else if(p.tab==="market"){
    const closed=MARKET_CLOSED[p.round];
    const isLeipzig=LEIPZIG_ROUNDS.includes(p.round);

    // Market status banner
    const mktBanner=h("div",{class:"sec"});
    mktBanner.append(
      h("div",{style:{
        padding:"8px",marginBottom:"0",
        background:isLeipzig?"rgba(201,149,43,.12)":closed?"rgba(139,0,0,.08)":"rgba(42,90,42,.08)",
        border:`1px solid ${isLeipzig?"rgba(201,149,43,.4)":closed?"rgba(139,0,0,.2)":"rgba(42,90,42,.2)"}`,
        fontSize:"11px",
        color:isLeipzig?"var(--gold2)":closed?"#ff9999":"#88cc88",
        fontWeight:"700"
      }}, L==="en"?rd.mkt_en:rd.mkt_cs));
    if(isLeipzig){
      mktBanner.append(h("div",{style:{
        padding:"6px 8px",fontSize:"10px",color:"#aaa",lineHeight:"1.5",
        background:"rgba(201,149,43,.05)",borderTop:"1px solid rgba(201,149,43,.15)"
      }}, L==="en"
        ?"Send your Trade Agent to market — all sell prices ×1.8 this month only. Merchants come from Frankfurt, Nuremberg, Kraków."
        :"Pošli obchodního agenta na trh — všechny prodejní ceny ×1.8 jen tento měsíc. Kupci přijíždějí z Frankfurtu, Norimberku, Krakova."));
    }
    content.append(mktBanner);

    // ── SELL SECTION ──
    const sellSec=h("div",{class:"sec"});
    sellSec.append(h("div",{class:"sec-title"},
      L==="en"?`Sell Stock${isLeipzig?" 🏪 ×1.8":""}`:
               `Prodej zásob${isLeipzig?" 🏪 ×1.8":""}`));

    if(closed){
      sellSec.append(h("div",{style:{fontSize:"11px",color:"#666",fontStyle:"italic"}},
        L==="en"?"Roads closed — no buyers until market opens.":"Cesty uzavřeny — žádní kupci."));
    } else {
      // Sell prices — Leipzig boost
      const leipsellMult = isLeipzig ? 1.8 : 1.0;
      const SELL_PRICES = {
        rags:{price:0.5*leipsellMult,        icon:"🧻", en:"Rags",        cs:"Hadry"},
        lead:{price:1*leipsellMult,           icon:"🔩", en:"Lead",         cs:"Olovo"},
        tin:{price:1.5*leipsellMult,          icon:"🥈", en:"Tin",          cs:"Cín"},
        antimony:{price:2*leipsellMult,       icon:"⬜", en:"Antimony",     cs:"Antimon"},
        soot:{price:0.5*leipsellMult,         icon:"🖤", en:"Soot",         cs:"Saze"},
        linseed_oil:{price:1*leipsellMult,    icon:"🫙", en:"Linseed oil",  cs:"Lněný olej"},
        paper:{price:2*leipsellMult,          icon:"📄", en:"Paper",        cs:"Papír"},
        ink:{price:2*leipsellMult,            icon:"⬛", en:"Ink",          cs:"Inkoust"},
        typemetal:{price:1.5*leipsellMult,    icon:"⚙️", en:"Type metal",   cs:"Liteřina"},
        vellum:{price:6*leipsellMult,         icon:"📜", en:"Vellum",       cs:"Pergamen"},
      };
      // Check agent bonus
      const hasAgent = p.workers.some(w=>w.prof==="agent"&&w.task==="sell"&&w.traits?.includes("obchodnik"));
      const sellMult = hasAgent ? 1.1 : 1.0;
      if(hasAgent){
        sellSec.append(h("div",{style:{fontSize:"10px",color:"var(--gold)",marginBottom:"6px"}},
          `🗺️ ${L==="en"?"Trade Agent active — sell prices +10%":"Obchodní agent aktivní — ceny +10%"}`));
      }

      let anythingToSell = false;
      Object.entries(SELL_PRICES).forEach(([key,{price,icon,en,cs}])=>{
        const qty = G.res[key]||0;
        if(qty<=0) return;
        anythingToSell=true;
        const unitPrice=Math.round(price*sellMult*10)/10;
        const totalPrice=Math.round(qty*price*sellMult);
        const row=h("div",{class:"sell-item-row"});
        row.append(
          h("div",{style:{display:"flex",gap:"6px",alignItems:"center",flex:"1"}},
            h("span",{style:{fontSize:"14px"}},icon),
            h("div",null,
              h("div",{class:"sell-item-name"},`${L==="en"?en:cs}`),
              h("div",{class:"sell-item-qty"},`${qty} ${L==="en"?"in stock":"na skladě"} · ${unitPrice}g/${L==="en"?"unit":"ks"}`))),
          h("div",{style:{display:"flex",gap:"4px",alignItems:"center"}},
            h("span",{class:"sell-item-price"},`~${totalPrice}g`),
            h("button",{class:"btn btn-s",onClick:()=>sellResource(key,1,price*sellMult)},
              L==="en"?"1×":"1×"),
            h("button",{class:"btn btn-s btn-p",onClick:()=>sellResource(key,qty,price*sellMult)},
              L==="en"?"All":"Vše")));
        sellSec.append(row);
      });
      // Printed books
      if(p.printedBooks){
        Object.entries(p.printedBooks).forEach(([fid,books])=>{
          if(!books||!books.length) return;
          anythingToSell=true;
          const fmt=BOOK_FORMATS[fid]; if(!fmt) return;
          const avgQ=Math.round(books.reduce((s,q)=>s+q,0)/books.length);
          const bookPrice=Math.round(fmt.baseValue*(0.7+avgQ*0.1)*leipsellMult*sellMult);
          const row=h("div",{class:"sell-item-row"});
          row.append(
            h("div",{style:{display:"flex",gap:"6px",alignItems:"center",flex:1}},
              h("span",{style:{fontSize:"14px"}},fmt.icon),
              h("div",null,
                h("div",{class:"sell-item-name"},`${fmt.symbol} ${L==="en"?fmt.en:fmt.cs}`),
                h("div",{class:"sell-item-qty"},`${books.length}× · ${"★".repeat(avgQ)} · ${bookPrice}g/ea`))),
            h("div",{style:{display:"flex",gap:"4px",alignItems:"center"}},
              h("span",{class:"sell-item-price"},`${books.length*bookPrice}g`),
              h("button",{class:"btn btn-s",onClick:()=>sellBooks(fid,1)},"1×"),
              h("button",{class:"btn btn-s btn-p",onClick:()=>sellBooks(fid,999)},
                L==="en"?"All":"Vše")));
          sellSec.append(row);
        });
      }
      // Illuminated works
      if(p.illuminatedWorks&&p.illuminatedWorks.length>0){
        p.illuminatedWorks.forEach((work,idx)=>{
          anythingToSell=true;
          const pg=ILLUMINATION_PIGMENTS[work.pigment];
          const fmt=BOOK_FORMATS[work.baseFormat];
          const salePrice=Math.round(work.value*leipsellMult*sellMult);
          const row=h("div",{class:"sell-item-row",style:{
            borderLeft:"2px solid rgba(201,149,43,.5)",
            background:"rgba(201,149,43,.03)"
          }});
          row.append(
            h("div",{style:{display:"flex",gap:"6px",alignItems:"center",flex:1}},
              h("span",{style:{fontSize:"14px"}},pg?.icon||"🎨"),
              h("div",null,
                h("div",{class:"sell-item-name"},
                  `${fmt?.symbol||""} ${L==="en"?pg?.en:pg?.cs} ${"★".repeat(work.quality)}`),
                h("div",{class:"sell-item-qty"},
                  `${work.illuminator} · ${salePrice}g${isLeipzig?" 🏪":""}`))),
            h("button",{class:"btn btn-s btn-p",
              onClick:()=>{sellIlluminatedWork(idx);}},
              L==="en"?"Sell":"Prodat"));
          sellSec.append(row);
        });
      }
      if(!anythingToSell){
        sellSec.append(h("div",{style:{fontSize:"11px",color:"#555",fontStyle:"italic"}},
          L==="en"?"Nothing in stock to sell.":"Zásoby jsou prázdné."));
      }
    }
    content.append(sellSec);

    // ── MARKET ATMOSPHERE ──
    initMarketPrices();
    const buyers=genMarketBuyers();
    const atmSec=h("div",{class:"sec"});
    atmSec.append(h("div",{class:"sec-title"},L==="en"?"Market Square · Olomouc":"Tržiště · Olomouc"));
    const atmDescs_en=["January cold keeps merchants indoors.","February — the last of the winter stores.","March — the trade year opens. New stock arrives.","April — Easter fairs begin across Moravia.","Corpus Christi — the square fills with pilgrims.","June heat. The ink dries fast.","High summer. A quiet market.","Harvest month. Grain merchants crowd the stalls.","Autumn fairs. Merchants settle debts.","October — the second Leipzig fair approaches.","St. Martin's wind. Winter is coming.","Advent quiet. Last sales of the year."];
    const atmDescs_cs=["Leden — kupci sedí doma v teple.","Únor — poslední zimní zásoby.","Březen — obchodní rok se otevírá.","Duben — velikonoční trhy na Moravě.","Boží Tělo — náměstí plné poutníků.","Červnové horko. Inkoust schne rychle.","Vrchol léta. Klidný trh.","Žňový měsíc. Obilní kupci tísní stánky.","Podzimní trhy. Kupci splácejí dluhy.","Říjen — druhý lipský jarmark se blíží.","Vítr na sv. Martina. Zima přichází.","Adventní klid. Poslední prodeje roku."];
    const atmDesc=isLeipzig
      ?(L==="en"?"The Leipzig Fair draws merchants from across the Empire. Prices soar.":"Lipský jarmark přitahuje kupce z celé Říše. Ceny stoupají.")
      :closed
        ?(L==="en"?"The square lies empty. Frost locks the gates. No trade today.":"Náměstí leží prázdné. Mráz uzavřel brány. Dnes se neobchoduje.")
        :(SEASON_ICONS[p.round]+" "+(L==="en"?atmDescs_en[p.round]:atmDescs_cs[p.round]));
    atmSec.append(h("div",{style:{fontSize:"11px",color:"#8a7a6a",fontStyle:"italic",
      lineHeight:"1.6",marginBottom:"10px",padding:"6px 8px",
      borderLeft:"2px solid rgba(139,0,0,.3)"}},atmDesc));
    if(!closed){
      const queueWrap=h("div",{style:{marginBottom:"6px"}});
      queueWrap.append(h("div",{style:{fontSize:"9px",textTransform:"uppercase",
        letterSpacing:"1.5px",color:"#444",fontWeight:"700",marginBottom:"5px"}},
        L==="en"?"Buyers in the Square":"Kupci na náměstí"));
      buyers.forEach(b=>{
        const row=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",
          padding:"5px 8px",marginBottom:"3px",
          border:"1px solid var(--border)",background:"rgba(255,255,255,.015)",fontSize:"11px"}});
        row.append(
          h("span",{style:{fontSize:"13px",flexShrink:0}},b.special?"✊":"🧑"),
          h("div",{style:{flex:1,minWidth:0}},
            h("span",{style:{color:"var(--paper)"}},b.name),
            h("span",{style:{color:"#555",fontSize:"10px"}},` ${L==="en"?"seeks":"hledá"} `),
            h("span",{style:{color:"var(--gold)",fontWeight:"700"}},b.good)),
          h("span",{style:{fontSize:"10px",color:"#888",flexShrink:0}},`~${b.offer}g`));
        queueWrap.append(row);
      });
      atmSec.append(queueWrap);
    }
    content.append(atmSec);

    // ── DYNAMIC PRICE BOARD ──
    const priceSec=h("div",{class:"sec"});
    priceSec.append(h("div",{class:"sec-title"},L==="en"?"Price Board":"Cenová tabule"));
    const PRICE_ITEMS=[
      {key:"rags",       icon:"🧻",en:"Rags",       cs:"Hadry",      buyQty:6, tip_en:"Paper (4→1)",      tip_cs:"Papír (4→1)"},
      {key:"lead",       icon:"🔩",en:"Lead",        cs:"Olovo",      buyQty:4, tip_en:"Alloy (2+1Sn→1)", tip_cs:"Liteřina (2+1Sn)"},
      {key:"tin",        icon:"🥈",en:"Tin",         cs:"Cín",        buyQty:3, tip_en:"Alloy 20%",        tip_cs:"Slitina 20%"},
      {key:"antimony",   icon:"⬜",en:"Antimony",    cs:"Antimon",    buyQty:2, tip_en:"Hardener (+qual)", tip_cs:"Tvrdidlo (+kval)"},
      {key:"soot",       icon:"🖤",en:"Soot",        cs:"Saze",       buyQty:4, tip_en:"Ink base (1+1→3)", tip_cs:"Inkoust (1+1→3)"},
      {key:"linseed_oil",icon:"🫙",en:"Linseed oil", cs:"Lněný olej", buyQty:3, tip_en:"Ink + lube",       tip_cs:"Inkoust + mazivo"},
      {key:"paper",      icon:"📄",en:"Paper",       cs:"Papír",      buyQty:3, tip_en:"Ready sheets",     tip_cs:"Hotové archy"},
      {key:"ink",        icon:"⬛",en:"Ink",         cs:"Inkoust",    buyQty:2, tip_en:"Printing ink",     tip_cs:"Tiskový inkoust"},
      {key:"typemetal",  icon:"⚙️",en:"Type metal",  cs:"Liteřina",   buyQty:2, tip_en:"Cast letters",     tip_cs:"Odlít litery"},
      {key:"vellum",     icon:"📜",en:"Vellum",      cs:"Pergamen",   buyQty:1, tip_en:"Luxury orders",    tip_cs:"Luxusní zakázky"},
    ];
    const priceGrid=h("div",{style:{display:"flex",flexDirection:"column",gap:"3px"}});
    PRICE_ITEMS.forEach(({key,icon,en,cs,buyQty,tip_en,tip_cs})=>{
      if(!BASE_PRICES[key]) return;
      const curPrice=G.marketPrices[key]||BASE_PRICES[key];
      const basePrice=BASE_PRICES[key];
      const trend=getPriceTrend(key);
      const stock=G.res[key]||0;
      const totalCost=Math.ceil(curPrice*buyQty);
      const canBuy=G.gold>=totalCost;
      const trendIcon=trend==="up"?"↑":trend==="down"?"↓":"↔";
      const trendColor=trend==="up"?"#cc4444":trend==="down"?"#44aa44":"#666";
      const pricePct=Math.round((curPrice/basePrice-1)*100);
      const priceColor=pricePct>15?"#cc4444":pricePct<-15?"#44aa44":"var(--paper)";
      const hist=G.priceHistory[key]||[];
      const sparkStr=hist.map(v=>{const r=v/basePrice;return r>1.15?"▇":r>1.05?"▅":r>0.95?"▃":r>0.85?"▂":"▁";}).join("");
      const card=h("div",{style:{
        display:"flex",alignItems:"center",gap:"8px",padding:"6px 8px",
        border:`1px solid ${trend==="up"?"rgba(180,40,40,.25)":trend==="down"?"rgba(40,140,40,.2)":"var(--border)"}`,
        background:trend==="up"?"rgba(139,0,0,.04)":trend==="down"?"rgba(20,60,20,.04)":"rgba(255,255,255,.01)",
      }});
      card.append(
        h("span",{style:{fontSize:"14px",flexShrink:0}},icon),
        h("div",{style:{flex:1,minWidth:0},title:L==="en"?tip_en:tip_cs},
          h("div",{style:{fontSize:"11px",fontWeight:"700",color:"var(--paper)"}},L==="en"?en:cs),
          h("div",{style:{fontSize:"9px",color:"#555",fontFamily:"'Courier New',monospace"}},sparkStr||"—")),
        h("div",{style:{textAlign:"center",minWidth:"28px",flexShrink:0}},
          h("div",{style:{fontSize:"9px",color:"#555"}},L==="en"?"stock":"sklad"),
          h("div",{style:{fontSize:"11px",fontWeight:"700",color:stock<2?"#cc6666":"var(--paper)"}},stock)),
        h("div",{style:{textAlign:"right",minWidth:"48px",flexShrink:0}},
          h("div",{style:{display:"flex",alignItems:"center",gap:"3px",justifyContent:"flex-end"}},
            h("span",{style:{fontSize:"12px",fontWeight:"700",color:priceColor}},curPrice+"g"),
            h("span",{style:{fontSize:"11px",color:trendColor,fontWeight:"700"}},trendIcon)),
          h("div",{style:{fontSize:"8px",color:"#555"}},`base ${basePrice}g`)),
        h("button",{
          class:"btn btn-s"+(canBuy?" btn-p":""),
          style:{flexShrink:0,opacity:canBuy?1:.35,fontSize:"9px",padding:"3px 6px"},
          title:`${L==="en"?"Buy":"Koupit"} ${buyQty}× = ${totalCost}g`,
          onClick:()=>{if(canBuy)buyResource(key,buyQty,totalCost);}},
          `+${buyQty}`));
      priceGrid.append(card);
    });
    priceSec.append(priceGrid);
    const smPct=Math.round((SEASON_PRICE_MULT[p.round]-1)*100);
    priceSec.append(h("div",{style:{fontSize:"9px",color:"#555",marginTop:"8px",fontStyle:"italic",
      padding:"5px 8px",borderTop:"1px solid var(--border)"}},
      smPct>0
        ?`⚠️ ${L==="en"?"Seasonal premium":"Sezónní příplatek"}: +${smPct}% — ${L==="en"?"winter scarcity":"zimní nedostatek"}`
        :smPct<0
          ?`✅ ${L==="en"?"Seasonal discount":"Sezónní sleva"}: ${smPct}% — ${L==="en"?"summer abundance":"letní hojnost"}`
          :`${L==="en"?"Market at normal prices this month.":"Trh za normální ceny tento měsíc."}`));
    content.append(priceSec);

    // ── REPUTATION TRACK ──
    const repSec=h("div",{class:"sec"});
    repSec.append(h("div",{class:"sec-title"},L==="en"?"Reputation":"Reputace"));
    const repTrack=h("div",{class:"rep-track"});
    for(let i=1;i<=10;i++){
      const filled=i<=p.reputation;
      const isThresh=i===4||i===7;
      repTrack.append(h("div",{class:"rep-pip",style:{
        background:filled?(i>=7?"#c9952b":i>=4?"#8b0000":"#4a2a2a"):"#111",
        borderColor:isThresh?"#444":"#1a1a1a",
      }}));
    }
    repSec.append(repTrack);
    repSec.append(h("div",{class:"rep-label"},
      h("span",null,L==="en"?"Populace":"Lid"),
      h("span",{style:{color:"#666"}},L==="en"?"State orders ≥4":"Státní ≥4"),
      h("span",{style:{color:p.reputation>=7?"var(--gold)":"#444"}},L==="en"?"Luxury ≥7":"Luxus ≥7")));
    content.append(repSec);

  // ── TAB: PARTY (Workers) ──
  } else if(p.tab==="party"){
    // Worker cards — clickable, open hero modal
    const grid=h("div",{class:"parta-grid"});
    if(p.workers.length===0){
      grid.style.cssText="padding:14px;grid-column:1/-1;";
      grid.append(h("div",{style:{fontSize:"11px",color:"#555",fontStyle:"italic"}},
        L==="en"?"No workers yet. Hire from below.":"Žádní dělníci. Najmi níže."));
    } else {
      p.workers.forEach(w=>{
        const mood=w.mood||60;
        const moodCls=mood>70?"mood-ok":mood>40?"mood-warn":"mood-bad";
        const fatPct=Math.round((w.fat||0)*100);
        const fatColor=w.fat>.7?"#8b0000":w.fat>.4?"#c9952b":"#2a5a2a";
        const loyColor=(w.loyalty||75)>60?"#2a5a2a":(w.loyalty||75)>35?"#c9952b":"#8b0000";
        const profEmoji={ragman:"🧻",leadman:"⚗️",inkman:"🖊️",compositor:"🔠",
          printer:"🖨️",engraver:"✂️",corrector:"🔍",agent:"🗺️"}[w.prof]||"👤";
        // Current task badge
        const taskBadge=h("div",{style:{
          position:"absolute",top:"4px",right:"4px",
          background:"rgba(139,0,0,.85)",
          fontSize:"8px",fontWeight:"700",padding:"1px 4px",
          letterSpacing:".5px",color:"#fff",
          border:"1px solid rgba(200,0,0,.4)",
        }},TASK_ICON[w.task]||"");
        const port=h("div",{class:"parta-portrait",style:{position:"relative"}});
        port.append(taskBadge);
        // Big emoji portrait
        const emojiWrap=h("div",{style:{width:"100%",height:"100%",display:"flex",
          alignItems:"center",justifyContent:"center",fontSize:"42px",
          background:"var(--bg)"}},profEmoji);
        port.append(emojiWrap);
        const card=h("div",{class:"parta-card "+moodCls,
          title:L==="en"?"Click for details":"Klikni pro detail",
          onClick:()=>openHeroModal(w.id)});
        card.style.cursor="pointer";
        card.append(port,
          h("div",{class:"parta-info"},
            h("div",{class:"parta-name"},w.name.split(" ")[0]), // first name only (space)
            h("div",{class:"parta-prof"},L==="en"?PROF_EN[w.prof]:PROF_CS[w.prof]),
            h("div",{class:"parta-stars"},"★".repeat(w.lv)+"☆".repeat(5-w.lv)),
            h("div",{style:{marginTop:"4px",display:"flex",flexDirection:"column",gap:"2px"}},
              ...[{v:fatPct,c:fatColor,l:L==="en"?"Fat":"Únava"},
                  {v:w.loyalty||75,c:loyColor,l:L==="en"?"Loy":"Loj"},
              ].map(({v,c,l})=>h("div",{style:{display:"flex",alignItems:"center",gap:"2px"}},
                h("span",{style:{fontSize:"7px",color:"#555",width:"16px",flexShrink:0}},l),
                h("div",{style:{flex:1,height:"2px",background:"rgba(255,255,255,.06)"}},
                  h("div",{style:{width:clamp(v,0,100)+"%",height:"100%",background:c}})))))));
        grid.append(card);
      });
    }
    content.append(grid);

    // Hire section — improved cards
    const hireSec=h("div",{class:"sec"});
    hireSec.append(h("div",{class:"sec-title"},L==="en"?"For Hire":"K dispozici"));
    const allAvail=getAvailableNPC().filter(n=>(n.availYear||0)<=G.gameYear);
    const notHired=allAvail.filter(npc=>!G.workers.some(w=>w.npcId===npc.id));
    if(notHired.length===0){
      hireSec.append(h("div",{style:{fontSize:"11px",color:"#555",fontStyle:"italic"}},
        L==="en"?"All available workers are already hired.":"Všichni dostupní dělníci jsou již najati."));
    } else {
      notHired.forEach(npc=>{
        const canH=G.gold>=npc.hireCost&&G.workers.length<MAX_WORKERS;
        const candidate={
          id:"direct_"+npc.id, npcId:npc.id,
          name:npc.name, prof:npc.prof, lv:npc.lv,
          traits:npc.traits, hireCost:npc.hireCost, wageMod:npc.wageMod,
          portrait:npc.portrait,
          quote_en:npc.quote_en, quote_cs:npc.quote_cs,
          loyalty:npc.loyalty, health:npc.health, mood:npc.mood,
          gender:npc.gender||"m", xp:0, fat:0, task:"idle"
        };
        const profEmoji={ragman:"🧻",leadman:"⚗️",inkman:"🖊️",compositor:"🔠",
          printer:"🖨️",engraver:"✂️",corrector:"🔍",agent:"🗺️"}[npc.prof]||"👤";
        const crd=h("div",{class:"hire-card"});
        const top=h("div",{class:"hire-card-top"});
        // Left: portrait + info
        const left=h("div",{style:{display:"flex",gap:"10px",alignItems:"flex-start",flex:"1"}});
        left.append(
          h("div",{style:{width:"44px",height:"52px",background:"var(--bg)",border:"1px solid var(--border2)",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",flexShrink:0}},
            profEmoji),
          h("div",{style:{flex:"1",minWidth:0}},
            h("div",{class:"hire-card-name"},`${npc.name}`),
            h("div",{class:"hire-card-prof"},`${stars(npc.lv)} · ${L==="en"?PROF_EN[npc.prof]:PROF_CS[npc.prof]}`),
            h("div",{class:"hire-card-quote"},`"${L==="en"?npc.quote_en:npc.quote_cs}"`)));
        // Right: hire button + wage
        const right=h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px",flexShrink:0}});
        right.append(
          h("button",{class:"btn btn-s"+(canH?" btn-p":""),
            style:{opacity:canH?1:.4},
            onClick:(e)=>{e.stopPropagation();if(canH)hireWorker(candidate);}},
            `${L==="en"?"Hire":"Najmout"} ${npc.hireCost}g`));
        if(npc.wageMod!==0){
          right.append(h("div",{style:{fontSize:"9px",color:npc.wageMod<0?"#88cc88":"#ff9999",whiteSpace:"nowrap"}},
            `${L==="en"?"Wage":"Mzda"} ${npc.wageMod>0?"+":""}${npc.wageMod}g`));
        }
        top.append(left,right);
        crd.append(top);
        // Traits row
        if(npc.traits?.length){
          const traitRow=h("div",{class:"hire-card-traits"});
          npc.traits.forEach(t=>{
            const td=TRAITS[t]; if(!td) return;

// ── PRINTSHOP AUDIO ENGINE ────────────────────────────────
class PrintshopAudio {
  constructor(){
    this.enabled=false; // off by default, user enables in Settings
    this._ctx=null;
  }
  _init(){
    if(this._ctx) return;
    this._ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.master=this._ctx.createGain();
    this.master.gain.value=0.7;
    this.limiter=this._ctx.createDynamicsCompressor();
    this.limiter.threshold.setValueAtTime(-3,this._ctx.currentTime);
    this.limiter.ratio.setValueAtTime(12,this._ctx.currentTime);
    this.limiter.attack.setValueAtTime(0.003,this._ctx.currentTime);
    this.limiter.release.setValueAtTime(0.15,this._ctx.currentTime);
    this.master.connect(this.limiter);
    this.limiter.connect(this._ctx.destination);
    this.reverbBus=this._ctx.createGain();
    this.reverbBus.gain.value=0.18;
    this.reverb=this._ctx.createConvolver();
    this._buildReverb();
    this.reverbBus.connect(this.reverb);
    this.reverb.connect(this.master);
    this._ambientRunning=false;
    this._ambientTimer=null;
  }
  _buildReverb(){
    const sr=this._ctx.sampleRate,len=Math.floor(sr*0.6);
    const buf=this._ctx.createBuffer(2,len,sr);
    for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,4);}
    this.reverb.buffer=buf;
  }
  _resume(){if(this._ctx&&this._ctx.state==='suspended')this._ctx.resume();}
  _noise(dur){const sr=this._ctx.sampleRate,s=Math.floor(sr*dur),buf=this._ctx.createBuffer(1,s,sr),d=buf.getChannelData(0);for(let i=0;i<s;i++)d[i]=Math.random()*2-1;const src=this._ctx.createBufferSource();src.buffer=buf;return src;}
  _osc(type,freq){const o=this._ctx.createOscillator();o.type=type;o.frequency.setValueAtTime(freq,this._ctx.currentTime);return o;}
  _gain(val){const g=this._ctx.createGain();g.gain.setValueAtTime(val,this._ctx.currentTime);return g;}
  _filt(type,freq,q){const f=this._ctx.createBiquadFilter();f.type=type;f.frequency.setValueAtTime(freq,this._ctx.currentTime);if(q!==undefined)f.Q.setValueAtTime(q,this._ctx.currentTime);return f;}

  play(name){
    if(!this.enabled) return;
    this._init(); this._resume();
    try{ this['_'+name]&&this['_'+name](); }catch(e){}
  }

  _screwCrank(){
    const t=this._ctx.currentTime;
    const noise=this._noise(0.4),filt=this._filt('bandpass',320,8),env=this._gain(0);
    env.gain.linearRampToValueAtTime(0.6,t+0.02);env.gain.setValueAtTime(0.6,t+0.15);env.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    filt.frequency.setValueAtTime(320,t);filt.frequency.linearRampToValueAtTime(180,t+0.4);
    noise.connect(filt);filt.connect(env);env.connect(this.master);env.connect(this.reverbBus);
    noise.start(t);noise.stop(t+0.4);
    const osc=this._osc('sawtooth',95),ov=this._gain(0),olf=this._filt('lowpass',400);
    ov.gain.linearRampToValueAtTime(0.25,t+0.01);ov.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    osc.frequency.exponentialRampToValueAtTime(70,t+0.35);
    osc.connect(olf);olf.connect(ov);ov.connect(this.master);osc.start(t);osc.stop(t+0.35);
  }
  _platten(){
    const t=this._ctx.currentTime;
    const kick=this._osc('sine',140),kv=this._gain(0);
    kv.gain.linearRampToValueAtTime(0.9,t+0.004);kv.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    kick.frequency.exponentialRampToValueAtTime(45,t+0.18);
    kick.connect(kv);kv.connect(this.master);kick.start(t);kick.stop(t+0.2);
    const pn=this._noise(0.25),pf=this._filt('bandpass',3500,2),pv=this._gain(0);
    pv.gain.linearRampToValueAtTime(0.12,t+0.07);pv.gain.exponentialRampToValueAtTime(0.001,t+0.3);
    pn.connect(pf);pf.connect(pv);pv.connect(this.master);pn.start(t+0.04);pn.stop(t+0.3);
  }
  _carriageSlide(){
    const t=this._ctx.currentTime;
    const sn=this._noise(0.5),sf=this._filt('bandpass',1200,3),sv=this._gain(0);
    sv.gain.linearRampToValueAtTime(0.25,t+0.03);sv.gain.setValueAtTime(0.25,t+0.3);sv.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    sf.frequency.setValueAtTime(1200,t);sf.frequency.linearRampToValueAtTime(600,t+0.5);
    sn.connect(sf);sf.connect(sv);sv.connect(this.master);sn.start(t);sn.stop(t+0.5);
  }
  _inkBallDab(){
    const t=this._ctx.currentTime;
    const n=this._noise(0.15),f=this._filt('lowpass',800),v=this._gain(0);
    v.gain.linearRampToValueAtTime(0.35,t+0.008);v.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    n.connect(f);f.connect(v);v.connect(this.master);n.start(t);n.stop(t+0.15);
  }
  _coinClink(){
    const t=this._ctx.currentTime;
    [[0,1320],[0.07,1540],[0.14,1180]].forEach(([d,fr])=>{
      const o=this._osc('sine',fr),v=this._gain(0);
      v.gain.linearRampToValueAtTime(0.3,t+d+0.003);v.gain.exponentialRampToValueAtTime(0.001,t+d+0.4);
      o.connect(v);v.connect(this.master);v.connect(this.reverbBus);o.start(t+d);o.stop(t+d+0.45);
    });
  }
  _bellComplete(){
    const t=this._ctx.currentTime;
    [[523.25,1.0],[1440.0,0.6],[2825.0,0.3]].forEach(([freq,amp],i)=>{
      const o=this._osc('sine',freq),v=this._gain(0);
      v.gain.linearRampToValueAtTime(amp*0.35,t+0.01);v.gain.exponentialRampToValueAtTime(0.001,t+2.5-i*0.4);
      o.connect(v);v.connect(this.master);v.connect(this.reverbBus);o.start(t);o.stop(t+2.8);
    });
  }
  _typeCase(){
    const t=this._ctx.currentTime;
    const num=3+Math.floor(Math.random()*4);
    for(let i=0;i<num;i++){
      const d=i*(0.06+Math.random()*0.04),fr=900+Math.random()*600;
      const n=this._noise(0.04),f=this._filt('bandpass',fr,5),v=this._gain(0);
      v.gain.linearRampToValueAtTime(0.18,t+d+0.003);v.gain.exponentialRampToValueAtTime(0.001,t+d+0.05);
      n.connect(f);f.connect(v);v.connect(this.master);n.start(t+d);n.stop(t+d+0.06);
    }
  }
  _woodCreak(){
    const t=this._ctx.currentTime,dur=0.8+Math.random()*0.6,freq=80+Math.random()*60;
    const o=this._osc('sawtooth',freq),f=this._filt('lowpass',300),v=this._gain(0);
    v.gain.linearRampToValueAtTime(0.1,t+dur*0.3);v.gain.setValueAtTime(0.1,t+dur*0.6);v.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.frequency.setValueAtTime(freq,t);o.frequency.linearRampToValueAtTime(freq*1.3,t+dur*0.4);o.frequency.linearRampToValueAtTime(freq*0.85,t+dur);
    o.connect(f);f.connect(v);v.connect(this.master);o.start(t);o.stop(t+dur+0.05);
  }
  _paperFeed(){
    const t=this._ctx.currentTime,dur=0.3+Math.random()*0.2;
    const n=this._noise(dur),f=this._filt('bandpass',4500,1.5),v=this._gain(0);
    v.gain.linearRampToValueAtTime(0.13,t+0.04);v.gain.exponentialRampToValueAtTime(0.001,t+dur);
    f.frequency.setValueAtTime(4500,t);f.frequency.linearRampToValueAtTime(3000,t+dur);
    n.connect(f);f.connect(v);v.connect(this.master);n.start(t);n.stop(t+dur+0.05);
  }
  printCycle(){
    if(!this.enabled)return;
    this._init();this._resume();
    this._inkBallDab();
    setTimeout(()=>this._carriageSlide&&this.play('carriageSlide'),350);
    setTimeout(()=>this.play('screwCrank'),650);
    setTimeout(()=>this.play('platten'),900);
    setTimeout(()=>this.play('screwCrank'),1150);
    setTimeout(()=>{this.play('carriageSlide');this.play('paperFeed');},1400);
  }

  _scheduleAmbient(){
    if(!this._ambientRunning)return;
    const events=[
      {w:4,n:'woodCreak'},{w:2,n:'typeCase'},{w:1,n:'paperFeed'},
    ];
    const total=events.reduce((s,e)=>s+e.w,0);let r=Math.random()*total;
    for(const e of events){r-=e.w;if(r<=0){this.play(e.n);break;}}
    this._ambientTimer=setTimeout(()=>this._scheduleAmbient(),2500+Math.random()*4000);
  }
  startAmbient(){if(this._ambientRunning)return;this._init();this._resume();this._ambientRunning=true;this._scheduleAmbient();}
  stopAmbient(){this._ambientRunning=false;clearTimeout(this._ambientTimer);}
  setVolume(v){if(this.master)this.master.gain.setValueAtTime(Math.max(0,Math.min(1,v)),this._ctx.currentTime);}
  enable(){this.enabled=true;this._init();this._resume();this.startAmbient();}
  disable(){this.enabled=false;this.stopAmbient();}
}

// ── SAVE / LOAD ───────────────────────────────────────────
function saveGame(){
  try{
    const data=JSON.stringify(G);
    localStorage.setItem('kt_v1', data);
    // Also offer file download
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`ThePressOlomouc_${G.gameYear||1468}_R${G.round+1}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(G.lang==="en"?"Game Saved":"Hra uložena",
      [G.lang==="en"?"Saved to browser + downloaded as JSON":"Uloženo do prohlížeče + staženo jako JSON"]);
  }catch(e){ showToast("Error",["Save failed: "+e.message]); }
}

function loadGame(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(parsed&&parsed.gameYear){
          Object.assign(G,parsed);
          render();
          showToast(G.lang==="en"?"Game Loaded":"Hra načtena",
            [`${G.lang==="en"?"Year":"Rok"} ${G.gameYear} · ${G.lang==="en"?"Round":"Kolo"} ${G.round+1}`]);
        }else throw new Error("Invalid save file");
      }catch(err){ showToast("Error",["Load failed: "+err.message]); }
    };
    reader.readAsText(file);
  };
  input.click();
}
